<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCD-F 2D Avatar Prototype (Yae Style)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #1a1a2e; color: white; font-family: sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; padding: 1rem; box-sizing: border-box; }
        .panel { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(8px); border-radius: 12px; padding: 1.5rem; pointer-events: auto; width: 320px; border: 1px solid rgba(255, 255, 255, 0.1); }
        input[type=range] { width: 100%; margin-top: 0.5rem; accent-color: #ec4899; }
        .status-badge { display: inline-block; padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.875rem; font-weight: bold; }
    </style>
</head>
<body>

<canvas id="avatarCanvas"></canvas>

<div id="ui-layer">
    <div class="panel">
        <h1 class="text-xl font-bold mb-1 text-pink-400">UCD-F Core Simulation</h1>
        <p class="text-xs text-gray-400 mb-4">制約下動的状態遷移システム - 負荷適応テスト</p>

        <div class="mb-4">
            <div class="flex justify-between items-center mb-1">
                <span class="text-sm font-medium text-gray-200">System Load (環境負荷)</span>
                <span id="loadValue" class="text-sm font-mono text-pink-400">0%</span>
            </div>
            <input type="range" id="loadSlider" min="0" max="100" value="0">
        </div>

        <div class="mb-4">
            <div class="flex justify-between items-center mb-1">
                <span class="text-sm font-medium text-gray-200">Smoothing (1€ Filter Sim)</span>
            </div>
            <input type="range" id="smoothSlider" min="1" max="20" value="8">
        </div>

        <div class="bg-slate-800 rounded-lg p-3 border border-slate-700">
            <div class="text-xs text-gray-400 mb-2">Degradation Level</div>
            <div id="degLevel" class="status-badge bg-green-500/20 text-green-400 border border-green-500/30">Lv 1: Optimal (All Active)</div>
            
            <div class="mt-3 space-y-1 text-xs">
                <div class="flex justify-between"><span>Tier 1 (Ear/Bangs):</span> <span id="t1Status" class="text-green-400">Active (60fps)</span></div>
                <div class="flex justify-between"><span>Tier 2 (Back Hair):</span> <span id="t2Status" class="text-green-400">Active (60fps)</span></div>
            </div>
        </div>
    </div>
</div>

<script>
/**
 * UCD-F (Universal Constrained Dynamics Framework) Prototype
 * * 1. SoA (Structure of Arrays) Architecture
 * 物理演算の対象となる頂点/ボーンデータを連続したメモリ領域 (Float32Array) に配置し、
 * GCの発生を抑え、将来的なWasm/SharedArrayBuffer連携を見据えた設計。
 */

const PART_COUNT = 5;
// Indexes: 0=Face(Base), 1=Bangs(T1), 2=LeftEar(T1), 3=RightEar(T1), 4=BackHair(T2)

// State Layer (SoA)
const State = {
    x: new Float32Array(PART_COUNT),
    y: new Float32Array(PART_COUNT),
    vx: new Float32Array(PART_COUNT),
    vy: new Float32Array(PART_COUNT),
    tx: new Float32Array(PART_COUNT), // Target X (Rest position)
    ty: new Float32Array(PART_COUNT), // Target Y (Rest position)
    
    // Properties
    tier: new Int8Array([0, 1, 1, 1, 2]), // 0: Base, 1: Essential, 2: Dispensable
    stiffness: new Float32Array([0, 0.15, 0.1, 0.1, 0.05]), // Spring constant k
    damping: new Float32Array([0, 0.85, 0.8, 0.8, 0.9]), // Damping c
    mass: new Float32Array([1, 1, 0.8, 0.8, 1.5]),
    
    // Base Offsets (Relative to Face)
    offsetX: new Float32Array([0, 0, -60, 60, 0]),
    offsetY: new Float32Array([0, -40, -90, -90, 80])
};

// Action Layer (Input Simulation)
let mouseX = window.innerWidth / 2;
let mouseY = window.innerHeight / 2;
let targetFaceX = window.innerWidth / 2;
let targetFaceY = window.innerHeight / 2;

// Constraints (UCD-F Load Monitor)
let currentLoad = 0;
let degradationLevel = 1;
let tickCount = 0;
let filterAlpha = 0.2; // 1 Euro Filter Simulation (Lerp factor)

// DOM Elements
const canvas = document.getElementById('avatarCanvas');
const ctx = canvas.getContext('2d');
const loadSlider = document.getElementById('loadSlider');
const loadValue = document.getElementById('loadValue');
const smoothSlider = document.getElementById('smoothSlider');
const degLevelEl = document.getElementById('degLevel');
const t1StatusEl = document.getElementById('t1Status');
const t2StatusEl = document.getElementById('t2Status');

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    targetFaceX = canvas.width / 2;
    targetFaceY = canvas.height / 2;
    State.x[0] = targetFaceX;
    State.y[0] = targetFaceY;
}
window.addEventListener('resize', resize);
resize();

// Input Tracking
window.addEventListener('mousemove', (e) => {
    mouseX = e.clientX;
    mouseY = e.clientY;
});
window.addEventListener('touchmove', (e) => {
    mouseX = e.touches[0].clientX;
    mouseY = e.touches[0].clientY;
});

// UI Event Listeners
loadSlider.addEventListener('input', (e) => {
    currentLoad = parseInt(e.target.value);
    loadValue.innerText = currentLoad + '%';
    updateConstraints();
});
smoothSlider.addEventListener('input', (e) => {
    filterAlpha = 1.0 / parseInt(e.target.value);
});

/**
 * UCD-F: Constraint Evaluation Layer
 * 負荷に応じてデグラデーションレベルを決定する
 */
function updateConstraints() {
    if (currentLoad < 30) {
        degradationLevel = 1;
        degLevelEl.className = "status-badge bg-green-500/20 text-green-400 border border-green-500/30";
        degLevelEl.innerText = "Lv 1: Optimal (All Active)";
        t1StatusEl.innerText = "Active (60fps)"; t1StatusEl.className = "text-green-400";
        t2StatusEl.innerText = "Active (60fps)"; t2StatusEl.className = "text-green-400";
    } else if (currentLoad < 60) {
        degradationLevel = 2;
        degLevelEl.className = "status-badge bg-yellow-500/20 text-yellow-400 border border-yellow-500/30";
        degLevelEl.innerText = "Lv 2: Warning (T2 Dropping)";
        t1StatusEl.innerText = "Active (60fps)"; t1StatusEl.className = "text-green-400";
        t2StatusEl.innerText = "Skipping (30fps)"; t2StatusEl.className = "text-yellow-400";
    } else if (currentLoad < 90) {
        degradationLevel = 3;
        degLevelEl.className = "status-badge bg-orange-500/20 text-orange-400 border border-orange-500/30";
        degLevelEl.innerText = "Lv 3: Heavy (T2 Stopped)";
        t1StatusEl.innerText = "Skipping (30fps)"; t1StatusEl.className = "text-yellow-400";
        t2StatusEl.innerText = "Stopped"; t2StatusEl.className = "text-red-400";
    } else {
        degradationLevel = 4;
        degLevelEl.className = "status-badge bg-red-500/20 text-red-400 border border-red-500/30";
        degLevelEl.innerText = "Lv 4: Critical (Sync Only)";
        t1StatusEl.innerText = "Stopped"; t1StatusEl.className = "text-red-400";
        t2StatusEl.innerText = "Stopped"; t2StatusEl.className = "text-red-400";
    }
}

/**
 * UCD-F: Dynamics Layer (Physics Engine via SoA)
 */
function updatePhysics() {
    tickCount++;
    
    // 1. Base Target Update (Tracking with smoothing)
    // マウスの動きを顔の向きとして計算
    const dx = mouseX - (canvas.width / 2);
    const dy = mouseY - (canvas.height / 2);
    // 稼働範囲を制限
    const clampedDx = Math.max(-100, Math.min(100, dx * 0.5));
    const clampedDy = Math.max(-100, Math.min(100, dy * 0.5));
    
    targetFaceX = (canvas.width / 2) + clampedDx;
    targetFaceY = (canvas.height / 2) + clampedDy;

    // Apply Filter (Smoothing)
    State.x[0] += (targetFaceX - State.x[0]) * filterAlpha;
    State.y[0] += (targetFaceY - State.y[0]) * filterAlpha;

    // 2. Physics Resolution (Spring-Damper System)
    // SoA構造をループして計算（Wasm化しやすい構造）
    for (let i = 1; i < PART_COUNT; i++) {
        const tier = State.tier[i];
        
        // Constraint Layer: 動的演算スキップ判定
        let shouldCalculate = true;
        if (degradationLevel === 2 && tier === 2 && tickCount % 2 !== 0) shouldCalculate = false;
        if (degradationLevel === 3 && tier === 2) shouldCalculate = false;
        if (degradationLevel === 3 && tier === 1 && tickCount % 2 !== 0) shouldCalculate = false;
        if (degradationLevel === 4) shouldCalculate = false; // LV4は揺れ演算完全停止

        // Target position based on Base(Face) + Offset + Parallax
        // 簡易的なパララックス（立体感）計算
        const parallaxX = clampedDx * (tier === 2 ? -0.2 : 0.5); 
        const parallaxY = clampedDy * (tier === 2 ? -0.1 : 0.2);

        State.tx[i] = State.x[0] + State.offsetX[i] + parallaxX;
        State.ty[i] = State.y[0] + State.offsetY[i] + parallaxY;

        if (shouldCalculate) {
            // Spring force: F = -k(x - tx)
            let fx = (State.tx[i] - State.x[i]) * State.stiffness[i];
            let fy = (State.ty[i] - State.y[i]) * State.stiffness[i];
            
            // Gravity effect on back hair
            if (tier === 2) fy += 1.5;

            // Update Velocity: v = (v + F/m) * damping
            State.vx[i] = (State.vx[i] + fx / State.mass[i]) * State.damping[i];
            State.vy[i] = (State.vy[i] + fy / State.mass[i]) * State.damping[i];

            // Update Position
            State.x[i] += State.vx[i];
            State.y[i] += State.vy[i];
        } else if (degradationLevel >= 3 && tier === 2 || degradationLevel === 4) {
            // 演算停止状態では、Targetに直接固定（揺れない）
            State.x[i] = State.tx[i];
            State.y[i] = State.ty[i];
            State.vx[i] = 0;
            State.vy[i] = 0;
        }
    }
}

/**
 * Adapter Layer: Render to Canvas
 * Wasmから共有メモリを参照して描画するプロセスをシミュレート
 */
function drawAvatar() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Yae Miko Color Palette
    const colors = {
        hairPink: '#ff99c2',
        hairDark: '#d96699',
        skin: '#ffe6e6',
        earInner: '#ffccdd',
        clothes: '#ffffff',
        accent: '#cc0044'
    };

    const cx = canvas.width / 2;
    const cy = canvas.height / 2;
    const faceX = State.x[0];
    const faceY = State.y[0];

    // 1. Back Hair (Tier 2) - Drawn Behind
    const backHairIdx = 4;
    ctx.fillStyle = colors.hairDark;
    ctx.beginPath();
    // 頭の頂点から後ろ髪の演算ポイントへ繋ぐポリゴン
    ctx.moveTo(faceX - 80, faceY - 50);
    ctx.quadraticCurveTo(faceX - 120, State.y[backHairIdx], State.x[backHairIdx] - 60, State.y[backHairIdx] + 150);
    ctx.lineTo(State.x[backHairIdx] + 60, State.y[backHairIdx] + 150);
    ctx.quadraticCurveTo(faceX + 120, State.y[backHairIdx], faceX + 80, faceY - 50);
    ctx.fill();

    // Body/Clothes (Static simplified)
    ctx.fillStyle = colors.clothes;
    ctx.beginPath();
    ctx.moveTo(cx - 100, canvas.height);
    ctx.lineTo(faceX - 60, faceY + 100);
    ctx.lineTo(faceX + 60, faceY + 100);
    ctx.lineTo(cx + 100, canvas.height);
    ctx.fill();
    // Collar accent
    ctx.strokeStyle = colors.accent;
    ctx.lineWidth = 10;
    ctx.beginPath();
    ctx.moveTo(faceX - 40, faceY + 100);
    ctx.lineTo(faceX, faceY + 130);
    ctx.lineTo(faceX + 40, faceY + 100);
    ctx.stroke();

    // 2. Ears (Tier 1)
    // Left Ear (Idx 2)
    ctx.fillStyle = colors.hairPink;
    ctx.beginPath();
    ctx.moveTo(faceX - 30, faceY - 60);
    ctx.quadraticCurveTo(State.x[2] - 40, State.y[2] + 20, State.x[2], State.y[2]);
    ctx.quadraticCurveTo(State.x[2] + 20, State.y[2] + 30, faceX - 70, faceY - 20);
    ctx.fill();
    // Right Ear (Idx 3)
    ctx.beginPath();
    ctx.moveTo(faceX + 30, faceY - 60);
    ctx.quadraticCurveTo(State.x[3] + 40, State.y[3] + 20, State.x[3], State.y[3]);
    ctx.quadraticCurveTo(State.x[3] - 20, State.y[3] + 30, faceX + 70, faceY - 20);
    ctx.fill();

    // 3. Face Base
    ctx.fillStyle = colors.skin;
    ctx.beginPath();
    ctx.ellipse(faceX, faceY, 70, 80, 0, 0, Math.PI * 2);
    ctx.fill();

    // Simple Facial Features (Tracking Parallax)
    const lookX = (mouseX - cx) * 0.05;
    const lookY = (mouseY - cy) * 0.05;
    
    // Eyes
    ctx.fillStyle = '#660033';
    ctx.beginPath(); ctx.ellipse(faceX - 30 + lookX, faceY - 10 + lookY, 10, 15, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(faceX + 30 + lookX, faceY - 10 + lookY, 10, 15, 0, 0, Math.PI*2); ctx.fill();
    
    // Mouth (Always active, simulating Lip Sync priority)
    ctx.fillStyle = '#cc5577';
    ctx.beginPath();
    ctx.ellipse(faceX + lookX, faceY + 35 + lookY, 15, 5 + Math.sin(Date.now() * 0.005) * 3, 0, 0, Math.PI*2); // Auto moving mouth
    ctx.fill();

    // 4. Bangs (Tier 1) - Front hair
    const bangsIdx = 1;
    ctx.fillStyle = colors.hairPink;
    ctx.beginPath();
    ctx.moveTo(faceX - 70, faceY - 20);
    ctx.quadraticCurveTo(faceX, faceY - 100, faceX + 70, faceY - 20);
    ctx.quadraticCurveTo(State.x[bangsIdx] + 30, State.y[bangsIdx], State.x[bangsIdx], State.y[bangsIdx] + 40);
    ctx.quadraticCurveTo(State.x[bangsIdx] - 30, State.y[bangsIdx], faceX - 70, faceY - 20);
    ctx.fill();
}

// Main Loop
function gameLoop() {
    updatePhysics();
    drawAvatar();
    requestAnimationFrame(gameLoop);
}

// Initialize
updateConstraints();
gameLoop();

</script>
</body>
</html>
