<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TVD Solar Orrery v2.2 - Cycle of Rebirth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=JetBrains+Mono&display=swap');
        
        body {
            margin: 0;
            overflow: hidden;
            background-color: #02040a;
            color: #e2e8f0;
            font-family: 'Inter', sans-serif;
        }
        canvas { display: block; touch-action: none; }

        #side-panel {
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            background: rgba(10, 15, 30, 0.95);
            backdrop-filter: blur(25px);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 50;
        }
        .panel-closed { transform: translateX(100%); }
        .panel-open { transform: translateX(0); }

        #panel-toggle {
            writing-mode: vertical-rl;
            text-orientation: mixed;
            background: rgba(30, 41, 59, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-right: none;
            cursor: pointer;
            z-index: 60;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: rgba(255,255,255,0.1);
            height: 4px;
            border-radius: 2px;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: #6366f1;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.5);
        }

        .data-text { font-family: 'JetBrains Mono', monospace; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        
        #announcement {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            text-align: center;
            z-index: 40;
        }
    </style>
</head>
<body class="flex flex-col h-screen">

    <div class="relative flex-grow overflow-hidden">
        <canvas id="mainCanvas"></canvas>
        
        <div id="announcement" class="hidden">
            <h2 id="announcement-text" class="text-2xl font-black tracking-[0.5em] uppercase text-cyan-400 opacity-0 transition-opacity duration-1000">System Rebirth</h2>
        </div>

        <!-- 左上: リアルタイム・テレメトリ -->
        <div class="absolute top-6 left-6 pointer-events-none">
            <div class="flex items-center gap-3 mb-4">
                <div class="w-3 h-3 bg-cyan-500 rounded-full animate-pulse shadow-[0_0_10px_rgba(6,182,212,0.8)]"></div>
                <h1 class="text-xs font-black tracking-widest uppercase opacity-80">TVD System Monitor v2.2</h1>
            </div>
            <div id="telemetry" class="data-text text-[10px] space-y-1 bg-black/40 p-4 border-l-2 border-cyan-500 backdrop-blur-md">
                <!-- JSで更新 -->
            </div>
        </div>

        <!-- 右側: スライドパネル -->
        <div id="side-panel" class="absolute top-0 right-0 h-full w-72 p-6 flex flex-col panel-closed shadow-2xl">
            <button id="panel-toggle" class="absolute left-[-32px] top-1/2 -translate-y-1/2 py-6 px-2 text-[10px] font-bold tracking-tighter uppercase rounded-l-xl text-cyan-300 hover:text-white transition-colors">
                Control Dynamics
            </button>

            <h2 class="text-sm font-bold border-b border-white/10 pb-4 mb-6 tracking-widest text-cyan-400">TVD PARAMETERS</h2>

            <div class="flex-grow space-y-8 overflow-y-auto pr-2 custom-scrollbar">
                
                <!-- Core Dynamics -->
                <div class="space-y-5">
                    <p class="text-[10px] font-bold opacity-40 uppercase tracking-widest">Input States</p>
                    
                    <div class="space-y-2">
                        <div class="flex justify-between text-[11px]">
                            <span>速度エネルギー (Drive)</span>
                            <span id="label-d" class="text-indigo-400 font-bold">0.00</span>
                        </div>
                        <input type="range" id="input-d" min="0" max="1" step="0.01" value="0.52">
                    </div>

                    <div class="space-y-2">
                        <div class="flex justify-between text-[11px]">
                            <span>拘束力 (Regulation)</span>
                            <span id="label-r" class="text-rose-400 font-bold">0.00</span>
                        </div>
                        <input type="range" id="input-r" min="0" max="1" step="0.01" value="0.50">
                    </div>

                    <div class="space-y-2">
                        <div class="flex justify-between text-[11px]">
                            <span>場密度 (Field)</span>
                            <span id="label-f" class="text-emerald-400 font-bold">0.00</span>
                        </div>
                        <input type="range" id="input-f" min="0" max="1" step="0.01" value="0.15">
                    </div>
                </div>

                <!-- Advanced Physics -->
                <div class="space-y-4 pt-6 border-t border-white/10">
                    <p class="text-[10px] font-bold opacity-40 uppercase tracking-widest">Physics Constants</p>
                    
                    <div class="space-y-2">
                        <div class="flex justify-between text-[11px]">
                            <span>減衰係数 (λ_eff)</span>
                            <span id="label-lambda" class="text-blue-300">0.50</span>
                        </div>
                        <input type="range" id="input-lambda" min="0.1" max="1" step="0.01" value="0.65">
                    </div>

                    <div class="space-y-2">
                        <div class="flex justify-between text-[11px]">
                            <span>反応感度 (k)</span>
                            <span id="label-k" class="text-purple-300">1.50</span>
                        </div>
                        <input type="range" id="input-k" min="0.5" max="3" step="0.1" value="1.2">
                    </div>
                </div>

                <div class="pt-4 space-y-3">
                    <button id="restore-btn" class="w-full py-3 bg-cyan-600/20 hover:bg-cyan-600/40 border border-cyan-500/30 rounded-lg text-[10px] font-bold tracking-widest uppercase transition-all text-cyan-300">
                        Manual Restore
                    </button>
                    <button id="reset-btn" class="w-full py-3 bg-white/5 hover:bg-white/10 border border-white/10 rounded-lg text-[10px] font-bold tracking-widest uppercase transition-all">
                        Factory Reset
                    </button>
                </div>
            </div>

            <div class="mt-auto pt-6 text-[9px] opacity-30 text-center uppercase tracking-tighter">
                Dynamic Rebirth System v2.2
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const telemetry = document.getElementById('telemetry');
        const sidePanel = document.getElementById('side-panel');
        const panelToggle = document.getElementById('panel-toggle');
        const announcement = document.getElementById('announcement');
        const announcementText = document.getElementById('announcement-text');

        let state = {
            D: 0.52,
            R: 0.50,
            Fi: 0.15,
            Fe: 0.0,
            lambda_eff: 0.65,
            epsilon: 0.01,
            k: 1.2,
            alpha: 0.08,
            dt: 0.1
        };

        const planetsConfig = [
            { name: "Mercury", r: 70, size: 2.5, speed: 4.8, color: "#94a3b8" },
            { name: "Venus", r: 100, size: 4, speed: 3.5, color: "#fbbf24" },
            { name: "Earth", r: 140, size: 4.5, color: "#3b82f6" },
            { name: "Mars", r: 180, size: 3.5, color: "#f87171" },
            { name: "Jupiter", r: 260, size: 10, color: "#fb923c" },
            { name: "Saturn", r: 330, size: 9, color: "#fde047" },
            { name: "Uranus", r: 390, size: 6, color: "#7dd3fc" },
            { name: "Neptune", r: 450, size: 6, color: "#818cf8" }
        ];

        let planets = [];
        let autoRestoreTimer = null;

        class Planet {
            constructor(cfg) {
                this.cfg = cfg;
                this.init();
            }

            init() {
                this.angle = Math.random() * Math.PI * 2;
                this.currentR = this.cfg.r;
                this.history = []; // 尾の座標と不透明度
                this.isAlive = true;
                this.maxHistory = 40;
                this.rebirthAnimation = 1.0; // 出現時の輝き
            }

            update(tvd) {
                if (!this.isAlive) return;

                const F_total = Math.min(1, Math.max(0, tvd.Fi + tvd.Fe));
                const dFactor = Math.sqrt(tvd.D / 0.5);
                const rFactor = Math.sqrt(tvd.R / 0.5);
                const fieldDrag = 1.0 - (F_total * 0.1);

                const baseSpeed = (this.cfg.speed || 1.5) * 0.0035;
                this.angle += baseSpeed * (dFactor / rFactor) * fieldDrag;

                const targetR = this.cfg.r * (dFactor / rFactor);
                this.currentR += (targetR - this.currentR) * 0.02; 

                // 履歴の更新（尾を引く）
                const cx = canvas.width / 2;
                const cy = canvas.height / 2;
                const x = cx + Math.cos(this.angle) * this.currentR;
                const y = cy + Math.sin(this.angle) * this.currentR;
                
                this.history.unshift({ x, y });
                if (this.history.length > this.maxHistory) this.history.pop();

                if (this.rebirthAnimation > 0) this.rebirthAnimation -= 0.02;

                // 境界判定
                if (this.currentR < 55 || this.currentR > Math.max(canvas.width, canvas.height) * 1.2) {
                    this.isAlive = false;
                }
            }

            draw() {
                if (!this.isAlive) return;

                // 尾（Tail）の描画: 後ろに行くほど細く、透明にする
                for (let i = 0; i < this.history.length - 1; i++) {
                    const p1 = this.history[i];
                    const p2 = this.history[i+1];
                    const alpha = (1 - i / this.history.length) * 0.4;
                    const size = this.cfg.size * (1 - i / this.history.length);

                    ctx.beginPath();
                    ctx.strokeStyle = this.cfg.color;
                    ctx.globalAlpha = alpha;
                    ctx.lineWidth = size;
                    ctx.lineCap = 'round';
                    ctx.moveTo(p1.x, p1.y);
                    ctx.lineTo(p2.x, p2.y);
                    ctx.stroke();
                }
                ctx.globalAlpha = 1.0;

                const head = this.history[0];
                if (!head) return;

                // 惑星本体
                ctx.beginPath();
                ctx.fillStyle = this.cfg.color;
                ctx.shadowBlur = 8 + (this.rebirthAnimation * 20);
                ctx.shadowColor = this.cfg.color;
                ctx.arc(head.x, head.y, this.cfg.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;

                // 名称
                ctx.fillStyle = `rgba(255,255,255,${0.4 + this.rebirthAnimation})`;
                ctx.font = "8px 'JetBrains Mono'";
                ctx.fillText(this.cfg.name.toUpperCase(), head.x + this.cfg.size + 6, head.y + 3);
            }
        }

        function initPlanets() {
            planets = planetsConfig.map(c => new Planet(c));
        }

        function triggerRebirth() {
            if (autoRestoreTimer) return;
            
            // 全滅を検知
            autoRestoreTimer = setTimeout(() => {
                announcement.classList.remove('hidden');
                announcementText.style.opacity = '1';
                
                setTimeout(() => {
                    planets.forEach(p => p.init());
                    announcementText.style.opacity = '0';
                    setTimeout(() => {
                        announcement.classList.add('hidden');
                        autoRestoreTimer = null;
                    }, 1000);
                }, 1500);
            }, 1000);
        }

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function stepTVD() {
            const F_total = Math.min(1, Math.max(0, state.Fi + state.Fe));
            const G = (v) => Math.exp(state.k * (v/10 - 0.5));
            
            const vD = 1 + 9 * state.D;
            const vR = 1 + 9 * state.R;
            const vF = 1 + 9 * F_total;

            const dD = G(vD) * (F_total - state.R) - state.lambda_eff * state.D * (1 - state.D) - state.epsilon * state.D**2;
            const dR = G(vR) * (state.D - F_total) - state.lambda_eff * state.R * (1 - state.R) - state.epsilon * state.R**2;
            const dF = G(vF) * (state.D - state.R) - state.lambda_eff * state.Fi * (1 - state.Fi) - state.epsilon * state.Fi**2;

            state.D += dD * state.dt;
            state.R += dR * state.dt;
            state.Fi += dF * state.dt;

            state.D = Math.max(0.01, Math.min(1, state.D));
            state.R = Math.max(0.01, Math.min(1, state.R));
            state.Fi = Math.max(0, Math.min(1, state.Fi));

            const output = Math.tanh((state.D - state.R) * (1 + F_total));
            const survivors = planets.filter(p => p.isAlive).length;
            
            if (survivors === 0) triggerRebirth();

            telemetry.innerHTML = `
                <div>DRIVE : ${state.D.toFixed(4)}</div>
                <div>REGUL : ${state.R.toFixed(4)}</div>
                <div>FIELD : ${F_total.toFixed(4)}</div>
                <div class="mt-2 text-cyan-400">OUTPUT : ${output.toFixed(4)}</div>
                <div class="text-white/40">SYSTEM: ${survivors > 0 ? 'STABLE' : 'COLLAPSED'}</div>
                <div class="text-white/20 text-[8px]">PLANETS: ${survivors} / ${planets.length}</div>
            `;
        }

        function drawSun() {
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 60);
            grad.addColorStop(0, "white");
            grad.addColorStop(0.2, "#fef3c7");
            grad.addColorStop(0.5, "#f59e0b");
            grad.addColorStop(1, "transparent");
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(cx, cy, 60, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = "#fff7ed";
            ctx.beginPath();
            ctx.arc(cx, cy, 15, 0, Math.PI * 2);
            ctx.fill();
        }

        function render() {
            // 残像感を出すために薄く塗りつぶすのではなく、背景をしっかり描画
            ctx.fillStyle = "#02040a";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 星の背景
            ctx.fillStyle = "rgba(255,255,255,0.1)";
            for(let i=0; i<50; i++) {
                const x = (Math.sin(i*123) * 0.5 + 0.5) * canvas.width;
                const y = (Math.cos(i*456) * 0.5 + 0.5) * canvas.height;
                ctx.fillRect(x, y, 1, 1);
            }

            stepTVD();
            drawSun();
            planets.forEach(p => {
                p.update(state);
                p.draw();
            });

            requestAnimationFrame(render);
        }

        const uiMap = {
            'input-d': { key: 'D', label: 'label-d' },
            'input-r': { key: 'R', label: 'label-r' },
            'input-f': { key: 'Fi', label: 'label-f' },
            'input-lambda': { key: 'lambda_eff', label: 'label-lambda' },
            'input-k': { key: 'k', label: 'label-k' }
        };

        function syncUI() {
            Object.entries(uiMap).forEach(([id, cfg]) => {
                const slider = document.getElementById(id);
                const label = document.getElementById(cfg.label);
                slider.addEventListener('input', (e) => {
                    const val = parseFloat(e.target.value);
                    state[cfg.key] += state.alpha * (val - state[cfg.key]);
                    label.innerText = val.toFixed(2);
                });
                label.innerText = parseFloat(slider.value).toFixed(2);
            });
        }

        panelToggle.addEventListener('click', () => {
            sidePanel.classList.toggle('panel-closed');
            sidePanel.classList.toggle('panel-open');
        });

        document.getElementById('restore-btn').addEventListener('click', () => {
            planets.forEach(p => p.init());
        });

        document.getElementById('reset-btn').addEventListener('click', () => {
            initPlanets();
            const defaults = { 'input-d': 0.52, 'input-r': 0.50, 'input-f': 0.15, 'input-lambda': 0.65, 'input-k': 1.2 };
            Object.entries(defaults).forEach(([id, val]) => {
                const s = document.getElementById(id);
                s.value = val;
                const cfg = uiMap[id];
                if(cfg) state[cfg.key] = val;
            });
            syncUI();
        });

        window.addEventListener('resize', resize);
        resize();
        initPlanets();
        syncUI();
        render();

    </script>
</body>
</html>
