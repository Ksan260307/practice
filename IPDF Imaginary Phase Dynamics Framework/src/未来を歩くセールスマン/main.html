<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>未来を歩くセールスマン</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            touch-action: manipulation;
            background-color: #0f172a;
            color: #f8fafc;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .canvas-container {
            position: relative;
            width: 100%;
            aspect-ratio: 1/1;
            background: radial-gradient(circle, #1e293b 0%, #0f172a 100%);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }
        .slider-thumb::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 24px;
            height: 24px;
            background: #38bdf8;
            cursor: pointer;
            border-radius: 50%;
            border: 4px solid #ffffff;
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .pulse {
            animation: pulse-animation 2s infinite;
        }
        @keyframes pulse-animation {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 0.4; }
            100% { transform: scale(1); opacity: 0.8; }
        }
    </style>
</head>
<body class="p-4 flex flex-col items-center min-h-screen">

    <!-- Header -->
    <div class="w-full max-w-md mb-4">
        <h1 class="text-2xl font-bold text-center bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400">
            未来を歩くセールスマン
        </h1>
        <p class="text-xs text-slate-400 text-center mt-1">「今」だけでなく「未来の可能性」で道を選ぶ</p>
    </div>

    <!-- Main Visual -->
    <div class="w-full max-w-md canvas-container mb-6">
        <canvas id="mainCanvas" class="w-full h-full"></canvas>
        <div id="statusOverlay" class="absolute top-4 left-4 flex flex-col gap-1">
            <div class="glass-card px-3 py-1 rounded-full text-xs flex items-center gap-2">
                <div class="w-2 h-2 rounded-full bg-blue-400"></div>
                <span>移動距離: <span id="distVal">0</span></span>
            </div>
        </div>
    </div>

    <!-- Controls -->
    <div class="w-full max-w-md space-y-6 pb-8">
        
        <!-- Parameter 1: Risk Lambda equivalent -->
        <div class="space-y-2">
            <div class="flex justify-between items-center">
                <label class="text-sm font-medium flex items-center gap-2">
                    🛡️ 慎重さ
                </label>
                <span class="text-xs text-blue-400" id="riskLabel">バランス</span>
            </div>
            <input type="range" id="riskSlider" min="0" max="100" value="50" 
                class="w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer slider-thumb">
            <p class="text-[10px] text-slate-500">未来の行き止まりを事前に察知して避ける力</p>
        </div>

        <!-- Parameter 2: Optionality Lambda equivalent -->
        <div class="space-y-2">
            <div class="flex justify-between items-center">
                <label class="text-sm font-medium flex items-center gap-2">
                    ✨ ひらめき
                </label>
                <span class="text-xs text-emerald-400" id="optLabel">標準</span>
            </div>
            <input type="range" id="optSlider" min="0" max="100" value="30" 
                class="w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer slider-thumb">
            <p class="text-[10px] text-slate-500">将来の選択肢をどれだけ広く残しておくか</p>
        </div>

        <!-- Parameter 3: Horizon equivalent -->
        <div class="space-y-2">
            <div class="flex justify-between items-center">
                <label class="text-sm font-medium flex items-center gap-2">
                    🔭 未来のビジョン
                </label>
                <span class="text-xs text-purple-400" id="horizonLabel">少し先</span>
            </div>
            <input type="range" id="horizonSlider" min="1" max="5" value="2" 
                class="w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer slider-thumb">
            <p class="text-[10px] text-slate-500">何歩先までの可能性を考慮して「今」を決めるか</p>
        </div>

        <div class="grid grid-cols-2 gap-3 pt-2">
            <button id="resetBtn" class="bg-slate-800 hover:bg-slate-700 py-3 rounded-xl font-bold text-sm transition">
                場所を変える
            </button>
            <button id="startBtn" class="bg-gradient-to-r from-blue-600 to-emerald-600 py-3 rounded-xl font-bold text-sm shadow-lg shadow-blue-900/20">
                スタート
            </button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const distValDisp = document.getElementById('distVal');
        
        let nodes = [];
        let visited = [];
        let currentIdx = -1;
        let isRunning = false;
        let totalDistance = 0;
        let futures = []; // 未来の潜在分布（虚数成分）の可視化用

        // 初期設定
        function init() {
            const size = 800; // 内部解像度
            canvas.width = size;
            canvas.height = size;
            generateNodes();
            draw();
        }

        function generateNodes() {
            nodes = [];
            const count = 12;
            for (let i = 0; i < count; i++) {
                nodes.push({
                    x: 100 + Math.random() * 600,
                    y: 100 + Math.random() * 600,
                    id: i
                });
            }
            resetSimulation();
        }

        function resetSimulation() {
            visited = [];
            currentIdx = 0; // 最初のノードからスタート
            visited.push(currentIdx);
            totalDistance = 0;
            distValDisp.innerText = "0";
            futures = [];
            isRunning = false;
            document.getElementById('startBtn').innerText = "スタート";
            draw();
        }

        function getDistance(n1, n2) {
            return Math.sqrt(Math.pow(n1.x - n2.x, 2) + Math.pow(n1.y - n2.y, 2));
        }

        // コアロジック: IPDFに基づく意思決定
        function decideNextAction() {
            if (visited.length >= nodes.length) return;

            const remaining = nodes.map((_, i) => i).filter(i => !visited.includes(i));
            if (remaining.length === 0) return;

            const riskWeight = document.getElementById('riskSlider').value / 100;
            const optWeight = document.getElementById('optSlider').value / 100;
            const horizon = parseInt(document.getElementById('horizonSlider').value);

            let bestScore = -Infinity;
            let bestNext = -1;
            let currentFutures = [];

            // 各選択肢（現在の行動 X）に対して未来分布（虚数成分 Y）をシミュレーション
            remaining.forEach(targetIdx => {
                const immediateDist = getDistance(nodes[currentIdx], nodes[targetIdx]);
                
                // 未来の予測（簡易的なモンテカルロ・ロールアウト）
                const futureSim = simulateFuture(targetIdx, remaining.filter(i => i !== targetIdx), horizon);
                
                // IPDFのスコアリング argmax_a E[Reward] - λ_risk * Risk + λ_opt * Optionality
                // Reward: 距離の短さ
                // Risk: 未来のトータル距離が長くなる（袋小路）可能性
                // Optionality: 次の地点からの選択肢の広さ（距離の分散など）
                
                const score = (1000 - immediateDist) 
                            - (riskWeight * futureSim.riskScore) 
                            + (optWeight * futureSim.optScore);

                if (score > bestScore) {
                    bestScore = score;
                    bestNext = targetIdx;
                }
                
                currentFutures.push({
                    from: nodes[currentIdx],
                    to: nodes[targetIdx],
                    score: futureSim.score,
                    paths: futureSim.paths
                });
            });

            futures = currentFutures;
            moveTo(bestNext);
        }

        function simulateFuture(startIdx, pool, depth) {
            // 未来の可能性の束（虚数成分）を計算
            let paths = [];
            let totalDistSum = 0;
            let sampleCount = 4; // 簡易化

            for (let i = 0; i < Math.min(sampleCount, pool.length); i++) {
                let current = startIdx;
                let tempPool = [...pool];
                let dist = 0;
                let path = [nodes[startIdx]];

                // 深度分だけ未来を予測
                for (let d = 0; d < depth && tempPool.length > 0; d++) {
                    // 近傍のランダムな未来
                    const nextIdx = tempPool[Math.floor(Math.random() * tempPool.length)];
                    dist += getDistance(nodes[current], nodes[nextIdx]);
                    path.push(nodes[nextIdx]);
                    tempPool = tempPool.filter(idx => idx !== nextIdx);
                    current = nextIdx;
                }
                paths.push(path);
                totalDistSum += dist;
            }

            // 指標抽出
            const avgFutureDist = totalDistSum / paths.length;
            const riskScore = avgFutureDist; // 遠すぎる未来はリスク
            const optScore = pool.length * 50; // 残り選択肢が多いほど自由度が高い

            return { riskScore, optScore, paths };
        }

        function moveTo(idx) {
            const d = getDistance(nodes[currentIdx], nodes[idx]);
            totalDistance += Math.round(d);
            distValDisp.innerText = totalDistance;
            currentIdx = idx;
            visited.push(idx);
            draw();
            
            if (visited.length === nodes.length) {
                isRunning = false;
                document.getElementById('startBtn').innerText = "完了！";
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 背景のグリッド
            ctx.strokeStyle = 'rgba(56, 189, 248, 0.05)';
            ctx.lineWidth = 1;
            for(let i=0; i<canvas.width; i+=50) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
            }

            // 未来の可能性（虚数成分 Y）の描画
            if (isRunning) {
                futures.forEach(f => {
                    f.paths.forEach(p => {
                        ctx.beginPath();
                        ctx.setLineDash([5, 5]);
                        ctx.strokeStyle = 'rgba(56, 189, 248, 0.15)';
                        ctx.moveTo(f.from.x, f.from.y);
                        p.forEach(point => ctx.lineTo(point.x, point.y));
                        ctx.stroke();
                        ctx.setLineDash([]);
                    });
                });
            }

            // 確定した経路（実数成分 X）
            ctx.beginPath();
            ctx.setLineDash([]);
            ctx.strokeStyle = '#38bdf8';
            ctx.lineWidth = 4;
            ctx.lineJoin = 'round';
            for (let i = 0; i < visited.length; i++) {
                const n = nodes[visited[i]];
                if (i === 0) ctx.moveTo(n.x, n.y);
                else ctx.lineTo(n.x, n.y);
            }
            ctx.stroke();

            // ノードの描画
            nodes.forEach((n, i) => {
                const isVisited = visited.includes(i);
                const isCurrent = i === currentIdx;

                // 外光
                if (isCurrent) {
                    const grad = ctx.createRadialGradient(n.x, n.y, 5, n.x, n.y, 30);
                    grad.addColorStop(0, 'rgba(56, 189, 248, 0.4)');
                    grad.addColorStop(1, 'transparent');
                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.arc(n.x, n.y, 30, 0, Math.PI * 2);
                    ctx.fill();
                }

                ctx.fillStyle = isCurrent ? '#fff' : (isVisited ? '#38bdf8' : '#475569');
                ctx.beginPath();
                ctx.arc(n.x, n.y, isCurrent ? 12 : 8, 0, Math.PI * 2);
                ctx.fill();

                if (isCurrent) {
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(n.x, n.y, 18, 0, Math.PI * 2);
                    ctx.stroke();
                }
            });
        }

        // Loop
        function step() {
            if (!isRunning) return;
            decideNextAction();
            if (visited.length < nodes.length) {
                setTimeout(step, 800);
            }
        }

        // Event Listeners
        document.getElementById('startBtn').addEventListener('click', () => {
            if (visited.length >= nodes.length) {
                resetSimulation();
                return;
            }
            isRunning = !isRunning;
            document.getElementById('startBtn').innerText = isRunning ? "停止" : "再開";
            if (isRunning) step();
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            generateNodes();
        });

        // UI Labels dynamic change
        const riskSlider = document.getElementById('riskSlider');
        const riskLabel = document.getElementById('riskLabel');
        riskSlider.addEventListener('input', (e) => {
            const v = e.target.value;
            if (v < 20) riskLabel.innerText = "大胆に";
            else if (v < 70) riskLabel.innerText = "バランス";
            else riskLabel.innerText = "極めて慎重";
        });

        const optSlider = document.getElementById('optSlider');
        const optLabel = document.getElementById('optLabel');
        optSlider.addEventListener('input', (e) => {
            const v = e.target.value;
            if (v < 20) optLabel.innerText = "直感的";
            else if (v < 70) optLabel.innerText = "標準";
            else optLabel.innerText = "可能性を重視";
        });

        const horizonSlider = document.getElementById('horizonSlider');
        const horizonLabel = document.getElementById('horizonLabel');
        horizonSlider.addEventListener('input', (e) => {
            const v = e.target.value;
            if (v == 1) horizonLabel.innerText = "目の前だけ";
            else if (v <= 3) horizonLabel.innerText = "少し先";
            else horizonLabel.innerText = "遥か先まで";
        });

        init();
    </script>
</body>
</html>
