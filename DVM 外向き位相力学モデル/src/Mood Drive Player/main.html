<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mood Drive Player</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* カスタムスタイルの調整 */
        canvas {
            transition: background-color 1s ease;
        }
        /* スクロールバーのカスタマイズ（プレイリスト用） */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1f2937;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: #4b5563;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #6b7280;
        }
        
        /* カスタムレンジスライダー (シークバー用) */
        input[type=range] {
            -webkit-appearance: none;
            background: transparent;
        }
        input[type=range]:focus {
            outline: none;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #374151; /* gray-700 */
            border-radius: 2px;
        }
        input[type=range]::-webkit-slider-thumb {
            height: 12px;
            width: 12px;
            border-radius: 50%;
            background: #818cf8; /* indigo-400 */
            cursor: pointer;
            -webkit-appearance: none;
            margin-top: -4px;
            box-shadow: 0 0 8px rgba(129, 140, 248, 0.6);
            transition: transform 0.1s;
        }
        input[type=range]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }
        
        /* ボリュームスライダー用 (少し小さく地味に) */
        #volume-bar::-webkit-slider-thumb {
            background: #9ca3af; /* gray-400 */
            box-shadow: none;
        }
        #volume-bar::-webkit-slider-thumb:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body class="min-h-screen bg-gray-950 text-white flex flex-col items-center justify-center p-4 font-sans selection:bg-indigo-500/30 relative">

    <!-- プレイヤー外枠 -->
    <div class="w-full max-w-md bg-gray-900 rounded-3xl shadow-2xl overflow-hidden border border-gray-800 flex flex-col relative z-10">
        
        <!-- ヘッダー -->
        <div class="p-6 flex justify-between items-center z-10 bg-gradient-to-b from-black/50 to-transparent">
            <div class="flex items-center space-x-2">
                <!-- Music Icon -->
                <svg class="w-5 h-5 text-gray-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 18V5l12-2v13"></path>
                    <circle cx="6" cy="18" r="3"></circle>
                    <circle cx="18" cy="16" r="3"></circle>
                </svg>
                <h1 class="font-bold tracking-wider text-gray-200">Mood Drive Player</h1>
            </div>
            
            <div class="flex items-center space-x-3">
                <!-- Activity Badge -->
                <div class="flex items-center space-x-1 px-3 py-1 bg-black/40 rounded-full border border-gray-700/50">
                    <svg class="w-4 h-4 text-indigo-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
                    </svg>
                    <!-- Energy初期値50に対応するBPM -->
                    <span id="bpm-display" class="text-sm font-mono text-indigo-300">110 BPM</span>
                </div>
                <!-- Settings Button -->
                <button id="btn-settings" class="p-2 bg-gray-800/80 hover:bg-gray-700 rounded-full transition-colors border border-gray-700/50 text-gray-300 hover:text-white">
                    <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                    </svg>
                </button>
            </div>
        </div>

        <!-- ビジュアルエリア (Canvas) -->
        <div class="relative w-full h-72 bg-black flex items-center justify-center overflow-hidden" id="canvas-container">
            <canvas id="visualizer" class="absolute inset-0 w-full h-full"></canvas>
            
            <!-- 現在のMood & 曲名テキストオーバーレイ -->
            <div class="relative z-10 text-center pointer-events-none drop-shadow-lg w-full px-4">
                <!-- 初期値50に対応するラベル -->
                <h2 id="mood-label" class="text-4xl font-extrabold tracking-tight mb-2 opacity-90 transition-all duration-500">
                    ひらめき
                </h2>
                <p id="mood-desc" class="text-lg text-white/70 font-medium tracking-wide mb-4">
                    創造的な展開
                </p>
                <!-- 現在の曲名表示 -->
                <div class="flex items-center justify-center space-x-2 text-sm text-gray-300 bg-black/30 backdrop-blur-sm rounded-full py-1.5 px-4 mx-auto max-w-xs border border-white/10">
                    <svg class="w-4 h-4 text-indigo-400 shrink-0" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
                    <span id="current-track-name" class="truncate font-medium">No track loaded</span>
                </div>
            </div>
        </div>

        <!-- コントロールパネル -->
        <div class="p-6 bg-gray-900 relative z-10">
            
            <!-- アクティビティバー (Driveの可視化) -->
            <div class="mb-4">
                <div class="flex justify-between text-xs text-gray-500 mb-2 font-medium">
                    <span>Calm</span>
                    <span id="energy-text">Energy: 50%</span>
                    <span>Intense</span>
                </div>
                <div class="h-2 w-full bg-gray-800 rounded-full overflow-hidden">
                    <div id="activity-bar" class="h-full transition-all duration-300 ease-out rounded-full" style="width: 50%; background-color: #047857; box-shadow: 0 0 10px #047857;"></div>
                </div>
            </div>

            <!-- プレイヤーコントロール UI -->
            
            <!-- シークバーと時間表示 -->
            <div class="mb-5">
                <div class="flex justify-between text-xs text-gray-400 mb-1.5 font-mono">
                    <span id="time-current">0:00</span>
                    <span id="time-duration">0:00</span>
                </div>
                <input type="range" id="seek-bar" value="0" min="0" max="100" step="0.1" class="w-full">
            </div>

            <!-- メインボタン群 -->
            <div class="flex items-center justify-between mb-2">
                <button id="btn-relax" class="p-3 rounded-2xl bg-gray-800 hover:bg-gray-700 transition active:scale-95 text-blue-400 flex flex-col items-center justify-center w-20 gap-1 shadow-inner border border-gray-800/50">
                    <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M7 16.3c2.2 0 4-1.83 4-4.05 0-1.16-.57-2.26-1.71-3.19S7.29 6.76 7 5.3c-.29 1.46-1.14 2.84-2.29 3.76S3 11.1 3 12.25c0 2.22 1.8 4.05 4 4.05z"></path>
                        <path d="M12.56 6.6A10.97 10.97 0 0 0 14 3.02c.5 2.5 2 4.9 4 6.5s3 3.5 3 5.5a6.98 6.98 0 0 1-11.91 4.97"></path>
                    </svg>
                    <span class="text-[10px] font-semibold">鎮静</span>
                </button>

                <!-- 再生コントロール -->
                <div class="flex items-center justify-center space-x-3">
                    <button id="btn-prev" class="p-2 text-gray-400 hover:text-white transition transform active:scale-90 bg-gray-800/50 rounded-full hover:bg-gray-800">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><polygon points="19 20 9 12 19 4 19 20"></polygon><line x1="5" y1="19" x2="5" y2="5"></line></svg>
                    </button>

                    <button id="btn-play" class="p-5 rounded-full transition-all transform active:scale-90 shadow-xl bg-gray-200 hover:bg-white text-gray-900 flex items-center justify-center">
                        <svg id="icon-play" class="w-7 h-7 fill-current ml-1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polygon points="5 3 19 12 5 21 5 3"></polygon>
                        </svg>
                        <svg id="icon-pause" class="w-7 h-7 fill-current hidden" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="6" y="4" width="4" height="16"></rect>
                            <rect x="14" y="4" width="4" height="16"></rect>
                        </svg>
                    </button>

                    <button id="btn-next" class="p-2 text-gray-400 hover:text-white transition transform active:scale-90 bg-gray-800/50 rounded-full hover:bg-gray-800">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 4 15 12 5 20 5 4"></polygon><line x1="19" y1="5" x2="19" y2="19"></line></svg>
                    </button>
                </div>

                <button id="btn-boost" class="p-3 rounded-2xl bg-gray-800 hover:bg-gray-700 transition active:scale-95 text-orange-500 flex flex-col items-center justify-center w-20 gap-1 shadow-inner border border-gray-800/50">
                    <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5s3 3.5 3 5.5a6.98 6.98 0 0 1-11.91 4.97"></path>
                    </svg>
                    <span class="text-[10px] font-semibold">高揚</span>
                </button>
            </div>
            
            <!-- ボリュームとフッター情報 -->
            <div class="flex items-center justify-between mt-5 pt-4 border-t border-gray-800/50">
                <div class="flex items-center space-x-2 text-gray-400">
                    <svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>
                    <input type="range" id="volume-bar" value="100" min="0" max="100" class="w-20">
                </div>
                <div class="text-xs text-gray-500 flex items-center gap-1">
                    <svg class="w-3 h-3 text-indigo-500" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"></path>
                    </svg>
                    <span>Auto Phase Sync</span>
                </div>
            </div>

        </div>
    </div>

    <!-- 設定 & プレイリスト モーダル -->
    <div id="settings-modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex flex-col items-center justify-center p-4 hidden opacity-0 transition-opacity duration-300">
        <div class="w-full max-w-md bg-gray-900 border border-gray-700 rounded-2xl shadow-2xl overflow-hidden flex flex-col max-h-[80vh]">
            
            <!-- モーダルヘッダー -->
            <div class="flex justify-between items-center p-4 border-b border-gray-800 bg-gray-900/50">
                <h3 class="font-bold text-lg text-gray-200 flex items-center gap-2">
                    <svg class="w-5 h-5 text-indigo-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>
                    Playlist Settings
                </h3>
                <button id="btn-close-settings" class="text-gray-400 hover:text-white transition-colors p-1 rounded-md hover:bg-gray-800">
                    <svg class="w-6 h-6" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>

            <!-- モーダルコンテンツ -->
            <div class="p-6 flex flex-col flex-1 overflow-hidden">
                <!-- フォルダ読み込み -->
                <div class="mb-6">
                    <p class="text-sm text-gray-400 mb-3">音楽フォルダを選択して、ローカルファイルを取り込みます。</p>
                    <label for="folder-input" class="w-full flex items-center justify-center gap-2 px-4 py-3 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl cursor-pointer transition-colors shadow-lg font-medium">
                        <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.2 8.4c.5.38.8.97.8 1.6v10a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5.83a2 2 0 0 1 1.53.72l1.35 1.68c.27.34.71.5 1.13.5H19a2 2 0 0 1 2 2v2.4"></path><line x1="12" y1="11" x2="12" y2="17"></line><line x1="9" y1="14" x2="15" y2="14"></line></svg>
                        <span>フォルダを選択</span>
                    </label>
                    <input type="file" id="folder-input" webkitdirectory directory multiple class="hidden" accept="audio/*">
                </div>

                <!-- プレイリスト -->
                <div class="flex-1 flex flex-col min-h-0">
                    <h4 class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Your Tracks</h4>
                    <div class="flex-1 overflow-y-auto pr-2 rounded-lg bg-black/20 border border-gray-800">
                        <ul id="playlist-container" class="divide-y divide-gray-800">
                            <li class="p-4 text-center text-sm text-gray-500 italic">
                                フォルダを読み込むとここに表示されます
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
            
        </div>
    </div>

    <!-- 内部ロジック (DVM & UCD-F & Audio) -->
    <script>
        /**
         * ============================================================================
         * [内部コアロジック] DVM (Drive-Velocity Mechanics) & UCD-F 適用レイヤ
         * ============================================================================
         */

        const TARGET_FPS = 60;
        const FRAME_TIME = 1000 / TARGET_FPS;
        const MAX_DRIVE = 100;
        const REGULATION_THRESHOLD = 90;

        // Velocity(状態)ごとのパラメータ設定 (10段階から20段階に拡張)
        const MOOD_STATES = [
            { v: 0, label: "コールドスリープ", desc: "完全な静寂", color: "#0f172a", bpm: 50, particleSpeed: 0.05, emitRate: 0.02, audio: { filterType: 'lowpass', filterFreq: 200, filterGain: 0, rate: 0.80, distortion: 0 } },
            { v: 1, label: "まどろみ", desc: "微かな意識", color: "#1e1b4b", bpm: 55, particleSpeed: 0.1, emitRate: 0.05, audio: { filterType: 'lowpass', filterFreq: 300, filterGain: 0, rate: 0.85, distortion: 0 } },
            { v: 2, label: "静寂", desc: "深い夜", color: "#2e1065", bpm: 60, particleSpeed: 0.15, emitRate: 0.08, audio: { filterType: 'lowpass', filterFreq: 500, filterGain: 0, rate: 0.88, distortion: 0 } },
            { v: 3, label: "リラックス", desc: "ゆったりとした時間", color: "#312e81", bpm: 65, particleSpeed: 0.2, emitRate: 0.1, audio: { filterType: 'lowpass', filterFreq: 800, filterGain: 0, rate: 0.9, distortion: 0 } },
            { v: 4, label: "ピースフル", desc: "穏やかな波音", color: "#3730a3", bpm: 70, particleSpeed: 0.3, emitRate: 0.15, audio: { filterType: 'lowpass', filterFreq: 1200, filterGain: 0, rate: 0.92, distortion: 0 } },
            { v: 5, label: "チルアウト", desc: "優しいローファイ", color: "#1e3a8a", bpm: 75, particleSpeed: 0.4, emitRate: 0.2, audio: { filterType: 'lowpass', filterFreq: 1800, filterGain: 0, rate: 0.95, distortion: 0 } },
            { v: 6, label: "アンビエント", desc: "広がる空間", color: "#1d4ed8", bpm: 80, particleSpeed: 0.5, emitRate: 0.25, audio: { filterType: 'lowpass', filterFreq: 2500, filterGain: 0, rate: 0.97, distortion: 0 } },
            { v: 7, label: "クワイエット・フォーカス", desc: "静かなる集中", color: "#0369a1", bpm: 85, particleSpeed: 0.6, emitRate: 0.3, audio: { filterType: 'lowpass', filterFreq: 3500, filterGain: 0, rate: 0.98, distortion: 0 } },
            { v: 8, label: "集中・ディープ", desc: "規則的なビート", color: "#0f766e", bpm: 90, particleSpeed: 0.8, emitRate: 0.35, audio: { filterType: 'lowpass', filterFreq: 5000, filterGain: 0, rate: 1.0, distortion: 0 } },
            { v: 9, label: "クリア・マインド", desc: "澄み切った思考", color: "#059669", bpm: 100, particleSpeed: 1.0, emitRate: 0.4, audio: { filterType: 'lowpass', filterFreq: 8000, filterGain: 0, rate: 1.0, distortion: 0 } },
            { v: 10, label: "ひらめき", desc: "創造的な展開", color: "#047857", bpm: 110, particleSpeed: 1.2, emitRate: 0.45, audio: { filterType: 'allpass', filterFreq: 20000, filterGain: 0, rate: 1.0, distortion: 0 } }, // Base 50
            { v: 11, label: "モチベーション", desc: "湧き上がる意欲", color: "#15803d", bpm: 115, particleSpeed: 1.5, emitRate: 0.5, audio: { filterType: 'allpass', filterFreq: 20000, filterGain: 0, rate: 1.02, distortion: 0 } },
            { v: 12, label: "ゾーン・没入", desc: "シームレスなグルーヴ", color: "#16a34a", bpm: 125, particleSpeed: 1.8, emitRate: 0.55, audio: { filterType: 'allpass', filterFreq: 20000, filterGain: 0, rate: 1.05, distortion: 0 } },
            { v: 13, label: "フロー", desc: "淀みない流れ", color: "#65a30d", bpm: 130, particleSpeed: 2.1, emitRate: 0.6, audio: { filterType: 'highshelf', filterFreq: 6000, filterGain: 2, rate: 1.07, distortion: 0 } },
            { v: 14, label: "アクティブ", desc: "力強いベースライン", color: "#ca8a04", bpm: 140, particleSpeed: 2.5, emitRate: 0.65, audio: { filterType: 'highshelf', filterFreq: 5000, filterGain: 4, rate: 1.1, distortion: 5 } },
            { v: 15, label: "グルーヴ", desc: "躍動するリズム", color: "#d97706", bpm: 145, particleSpeed: 3.0, emitRate: 0.7, audio: { filterType: 'highshelf', filterFreq: 4000, filterGain: 6, rate: 1.12, distortion: 15 } },
            { v: 16, label: "ドライブ", desc: "疾走するシンセ", color: "#ea580c", bpm: 155, particleSpeed: 3.5, emitRate: 0.75, audio: { filterType: 'highshelf', filterFreq: 3000, filterGain: 8, rate: 1.15, distortion: 30 } },
            { v: 17, label: "エキサイト", desc: "沸き立つ感情", color: "#dc2626", bpm: 160, particleSpeed: 4.2, emitRate: 0.8, audio: { filterType: 'highshelf', filterFreq: 2500, filterGain: 10, rate: 1.18, distortion: 60 } },
            { v: 18, label: "熱狂・ピーク", desc: "圧倒的なエネルギー", color: "#b91c1c", bpm: 170, particleSpeed: 5.0, emitRate: 0.9, audio: { filterType: 'highshelf', filterFreq: 2000, filterGain: 12, rate: 1.2, distortion: 120 } },
            { v: 19, label: "オーバーヒート", desc: "クールダウン待機...", color: "#9f1239", bpm: 180, particleSpeed: 8.0, emitRate: 1.0, audio: { filterType: 'lowpass', filterFreq: 1000, filterGain: 0, rate: 1.3, distortion: 300 } }
        ];

        const getVelocityPhase = (drive) => {
            if (drive < 5) return 0;
            if (drive < 10) return 1;
            if (drive < 15) return 2;
            if (drive < 20) return 3;
            if (drive < 25) return 4;
            if (drive < 30) return 5;
            if (drive < 35) return 6;
            if (drive < 40) return 7;
            if (drive < 45) return 8;
            if (drive < 50) return 9;
            if (drive < 55) return 10;
            if (drive < 60) return 11;
            if (drive < 65) return 12;
            if (drive < 70) return 13;
            if (drive < 75) return 14;
            if (drive < 80) return 15;
            if (drive < 85) return 16;
            if (drive < 90) return 17;
            if (drive < 95) return 18;
            return 19;
        };

        const MAX_PARTICLES = 300;
        const pX = new Float32Array(MAX_PARTICLES);
        const pY = new Float32Array(MAX_PARTICLES);
        const pVX = new Float32Array(MAX_PARTICLES);
        const pVY = new Float32Array(MAX_PARTICLES);
        const pLife = new Float32Array(MAX_PARTICLES);
        const pMaxLife = new Float32Array(MAX_PARTICLES);

        let isPlaying = false;
        let displayBpm = 110;
        let prevVelocityIndex = -1;

        const engineState = {
            drive: 50, // 自然減衰を廃止し、デフォルトのベースラインを50に設定
            velocity: 10, // 20段階変更に伴い、50に対応するPhase 10に変更
            lastTime: performance.now(),
            accumulator: 0
        };

        // --- Audio Player & Web Audio API State ---
        const audioPlayer = new Audio();
        audioPlayer.crossOrigin = "anonymous";
        let playlistTracks = [];
        let currentTrackIndex = -1;

        let audioCtx;
        let source;
        let biquadFilter;
        let distortionNode;
        let gainNode;

        // 現在の補間中オーディオパラメータ
        let currentAudioState = {
            filterFreq: 20000,
            filterGain: 0,
            rate: 1.0,
            distortion: 0
        };
        let lastDistortionAmount = -1;

        // Web Audio APIの初期化
        function initAudioAPI() {
            if (audioCtx) {
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
                return;
            }
            
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();
            
            source = audioCtx.createMediaElementSource(audioPlayer);
            
            biquadFilter = audioCtx.createBiquadFilter();
            biquadFilter.type = 'allpass';
            
            distortionNode = audioCtx.createWaveShaper();
            distortionNode.oversample = '4x';
            
            gainNode = audioCtx.createGain();
            
            source.connect(biquadFilter);
            biquadFilter.connect(distortionNode);
            distortionNode.connect(gainNode);
            gainNode.connect(audioCtx.destination);
        }

        function makeDistortionCurve(amount) {
            let k = typeof amount === 'number' ? amount : 50;
            let n_samples = 44100;
            let curve = new Float32Array(n_samples);
            let deg = Math.PI / 180;
            let i = 0;
            let x;
            for ( ; i < n_samples; ++i ) {
                x = i * 2 / n_samples - 1;
                curve[i] = ( 3 + k ) * x * 20 * deg / ( Math.PI + k * Math.abs(x) );
            }
            return curve;
        }

        function applyDistortion(amount) {
            if (!distortionNode) return;
            if (amount < 1) {
                distortionNode.curve = null;
                lastDistortionAmount = -1;
                return;
            }
            if (Math.abs(amount - lastDistortionAmount) > 5) {
                distortionNode.curve = makeDistortionCurve(amount);
                lastDistortionAmount = amount;
            }
        }

        // 時間フォーマット関数
        function formatTime(seconds) {
            if (isNaN(seconds) || !isFinite(seconds)) return "0:00";
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        // --- DOM Elements ---
        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('canvas-container');
        
        const uiElements = {
            label: document.getElementById('mood-label'),
            desc: document.getElementById('mood-desc'),
            bpm: document.getElementById('bpm-display'),
            energyText: document.getElementById('energy-text'),
            bar: document.getElementById('activity-bar'),
            btnPlay: document.getElementById('btn-play'),
            btnPrev: document.getElementById('btn-prev'),
            btnNext: document.getElementById('btn-next'),
            iconPlay: document.getElementById('icon-play'),
            iconPause: document.getElementById('icon-pause'),
            trackName: document.getElementById('current-track-name'),
            
            timeCurrent: document.getElementById('time-current'),
            timeDuration: document.getElementById('time-duration'),
            seekBar: document.getElementById('seek-bar'),
            volumeBar: document.getElementById('volume-bar'),

            btnSettings: document.getElementById('btn-settings'),
            btnCloseSettings: document.getElementById('btn-close-settings'),
            modalSettings: document.getElementById('settings-modal'),
            folderInput: document.getElementById('folder-input'),
            playlistContainer: document.getElementById('playlist-container')
        };

        // --- モーダル制御 ---
        function openSettings() {
            uiElements.modalSettings.classList.remove('hidden');
            setTimeout(() => {
                uiElements.modalSettings.classList.remove('opacity-0');
                uiElements.modalSettings.classList.add('opacity-100');
            }, 10);
        }

        function closeSettings() {
            uiElements.modalSettings.classList.remove('opacity-100');
            uiElements.modalSettings.classList.add('opacity-0');
            setTimeout(() => {
                uiElements.modalSettings.classList.add('hidden');
            }, 300);
        }

        uiElements.btnSettings.addEventListener('click', openSettings);
        uiElements.btnCloseSettings.addEventListener('click', closeSettings);
        uiElements.modalSettings.addEventListener('click', (e) => {
            if (e.target === uiElements.modalSettings) closeSettings();
        });

        // --- ファイル読み込み ---
        uiElements.folderInput.addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            const audioFiles = files.filter(file => file.type.startsWith('audio/'));
            
            if (audioFiles.length > 0) {
                playlistTracks = audioFiles;
                renderPlaylist();
                loadTrack(0, false);
            } else {
                uiElements.playlistContainer.innerHTML = `
                    <li class="p-4 text-center text-sm text-red-400">
                        音声ファイルが見つかりませんでした。
                    </li>
                `;
            }
        });

        function renderPlaylist() {
            uiElements.playlistContainer.innerHTML = '';
            
            playlistTracks.forEach((file, index) => {
                const li = document.createElement('li');
                li.className = `p-3 flex items-center justify-between cursor-pointer hover:bg-gray-800 transition-colors group ${index === currentTrackIndex ? 'bg-indigo-900/30 border-l-4 border-indigo-500' : 'border-l-4 border-transparent'}`;
                
                const displayName = file.name.replace(/\.[^/.]+$/, "");

                li.innerHTML = `
                    <div class="flex items-center space-x-3 overflow-hidden">
                        <div class="w-8 h-8 rounded-full bg-gray-800 flex items-center justify-center shrink-0 group-hover:bg-indigo-600 transition-colors">
                            <svg class="w-4 h-4 text-gray-400 group-hover:text-white ${index === currentTrackIndex ? 'text-indigo-400' : ''}" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>
                        </div>
                        <span class="text-sm font-medium text-gray-200 truncate ${index === currentTrackIndex ? 'text-indigo-300' : ''}">${displayName}</span>
                    </div>
                `;

                li.addEventListener('click', () => {
                    loadTrack(index, true);
                });

                uiElements.playlistContainer.appendChild(li);
            });
        }

        // --- 音楽再生コントロール ---
        function loadTrack(index, autoPlay = false) {
            if (index < 0 || index >= playlistTracks.length) return;
            
            if (audioPlayer.src && audioPlayer.src.startsWith('blob:')) {
                URL.revokeObjectURL(audioPlayer.src);
            }

            currentTrackIndex = index;
            const file = playlistTracks[index];
            const objectUrl = URL.createObjectURL(file);
            
            audioPlayer.src = objectUrl;
            audioPlayer.load();

            const displayName = file.name.replace(/\.[^/.]+$/, "");
            uiElements.trackName.textContent = displayName;
            renderPlaylist();

            // 読み込み時に表示時間をリセット
            uiElements.timeCurrent.textContent = "0:00";
            uiElements.seekBar.value = 0;

            if (autoPlay || isPlaying) {
                playAudio();
            }
        }

        function playAudio() {
            if (playlistTracks.length === 0) return;
            initAudioAPI();
            if (audioPlayer.src) {
                audioPlayer.play().catch(e => console.error("Playback failed:", e));
            }
            isPlaying = true;
            updatePlayButtonUI();
        }

        function pauseAudio() {
            audioPlayer.pause();
            isPlaying = false;
            updatePlayButtonUI();
        }

        function playNext() {
            if (playlistTracks.length === 0) return;
            const nextIndex = (currentTrackIndex + 1) % playlistTracks.length;
            loadTrack(nextIndex, true);
        }

        function playPrev() {
            if (playlistTracks.length === 0) return;
            let prevIndex = currentTrackIndex - 1;
            if (prevIndex < 0) prevIndex = playlistTracks.length - 1;
            loadTrack(prevIndex, true);
        }

        uiElements.btnNext.addEventListener('click', playNext);
        uiElements.btnPrev.addEventListener('click', playPrev);
        audioPlayer.addEventListener('ended', playNext);

        uiElements.btnPlay.addEventListener('click', () => {
            if (isPlaying) pauseAudio();
            else playAudio();
        });

        function updatePlayButtonUI() {
            if (isPlaying) {
                uiElements.btnPlay.className = "p-5 rounded-full transition-all transform active:scale-90 shadow-xl bg-indigo-600 hover:bg-indigo-500 text-white flex items-center justify-center";
                uiElements.iconPlay.classList.add('hidden');
                uiElements.iconPause.classList.remove('hidden');
            } else {
                uiElements.btnPlay.className = "p-5 rounded-full transition-all transform active:scale-90 shadow-xl bg-gray-200 hover:bg-white text-gray-900 flex items-center justify-center";
                uiElements.iconPlay.classList.remove('hidden');
                uiElements.iconPause.classList.add('hidden');
            }
        }

        // --- シークバー & ボリューム 制御 ---
        let isDraggingSeek = false;

        uiElements.seekBar.addEventListener('input', () => {
            isDraggingSeek = true;
        });

        uiElements.seekBar.addEventListener('change', () => {
            if (audioPlayer.duration) {
                audioPlayer.currentTime = (uiElements.seekBar.value / 100) * audioPlayer.duration;
            }
            isDraggingSeek = false;
        });

        audioPlayer.addEventListener('timeupdate', () => {
            if (!isDraggingSeek && audioPlayer.duration) {
                const percent = (audioPlayer.currentTime / audioPlayer.duration) * 100;
                uiElements.seekBar.value = percent;
                uiElements.timeCurrent.textContent = formatTime(audioPlayer.currentTime);
            }
        });

        audioPlayer.addEventListener('loadedmetadata', () => {
            uiElements.timeDuration.textContent = formatTime(audioPlayer.duration);
        });

        uiElements.volumeBar.addEventListener('input', (e) => {
            const vol = e.target.value / 100;
            audioPlayer.volume = vol;
        });

        // --- 気分（Drive）コントロール ---
        document.getElementById('btn-boost').addEventListener('click', () => {
            if (!isPlaying) {
                playAudio();
            }
            engineState.drive += 5; // 増減幅を5に変更
        });

        document.getElementById('btn-relax').addEventListener('click', () => {
            engineState.drive -= 5; // 増減幅を5に変更
        });

        function resizeCanvas() {
            const rect = container.getBoundingClientRect();
            if (canvas.width !== rect.width || canvas.height !== rect.height) {
                canvas.width = rect.width;
                canvas.height = rect.height;
            }
        }

        // --- DVM Core Loop & Audio Transition ---
        function updatePhysics() {
            if (isPlaying) {
                // 自動で揺れ動く処理（微小なゆらぎ）を廃止し、固定値に。
                // ユーザー入力時のみ drive が変動する。

                // 極端な加熱を防ぐ調整力(R)は維持（ユーザー入力で90を超えた場合に戻す力）
                if (engineState.drive > REGULATION_THRESHOLD) {
                    engineState.drive -= (engineState.drive - REGULATION_THRESHOLD) * 0.05;
                }
            }

            engineState.drive = Math.max(0, Math.min(MAX_DRIVE, engineState.drive));
            engineState.velocity = getVelocityPhase(engineState.drive);
            const moodConfig = MOOD_STATES[engineState.velocity];

            displayBpm += (moodConfig.bpm - displayBpm) * 0.05;

            // --- 音楽の相転移（Web Audio APIへの適用） ---
            const targetAudio = moodConfig.audio;

            currentAudioState.filterFreq += (targetAudio.filterFreq - currentAudioState.filterFreq) * 0.05;
            currentAudioState.filterGain += (targetAudio.filterGain - currentAudioState.filterGain) * 0.05;
            currentAudioState.rate += (targetAudio.rate - currentAudioState.rate) * 0.05;
            currentAudioState.distortion += (targetAudio.distortion - currentAudioState.distortion) * 0.05;

            if (biquadFilter && audioPlayer.src) {
                if (biquadFilter.type !== targetAudio.filterType) {
                    biquadFilter.type = targetAudio.filterType;
                }
                
                biquadFilter.frequency.value = currentAudioState.filterFreq;
                if (targetAudio.filterType === 'highshelf' || targetAudio.filterType === 'lowshelf') {
                     biquadFilter.gain.value = currentAudioState.filterGain;
                }

                applyDistortion(currentAudioState.distortion);

                if (Math.abs(audioPlayer.playbackRate - currentAudioState.rate) > 0.01) {
                     audioPlayer.playbackRate = currentAudioState.rate;
                }
            }
            // ---------------------------------------------

            uiElements.energyText.textContent = `Energy: ${Math.round(engineState.drive)}%`;
            uiElements.bar.style.width = `${engineState.drive}%`;
            uiElements.bpm.textContent = `${Math.round(displayBpm)} BPM`;

            if (prevVelocityIndex !== engineState.velocity) {
                uiElements.label.textContent = moodConfig.label;
                uiElements.desc.textContent = moodConfig.desc;
                uiElements.bar.style.backgroundColor = moodConfig.color;
                uiElements.bar.style.boxShadow = `0 0 10px ${moodConfig.color}`;
                prevVelocityIndex = engineState.velocity;
            }
        }

        // --- Canvas Rendering (UCD-F 描画レイヤ) ---
        function drawParticles(width, height) {
            const moodConfig = MOOD_STATES[engineState.velocity];
            
            ctx.fillStyle = moodConfig.color;
            ctx.fillRect(0, 0, width, height);

            if (Math.random() < moodConfig.emitRate * 2) {
                for (let i = 0; i < MAX_PARTICLES; i++) {
                    if (pLife[i] <= 0) {
                        pX[i] = width / 2 + (Math.random() - 0.5) * 50;
                        pY[i] = height / 2 + (Math.random() - 0.5) * 50;
                        
                        const angle = Math.random() * Math.PI * 2;
                        const speed = Math.random() * moodConfig.particleSpeed + (engineState.drive * 0.02);
                        pVX[i] = Math.cos(angle) * speed;
                        pVY[i] = Math.sin(angle) * speed;
                        
                        pMaxLife[i] = 50 + Math.random() * 100;
                        pLife[i] = pMaxLife[i];
                        break;
                    }
                }
            }

            ctx.globalCompositeOperation = 'lighter';
            for (let i = 0; i < MAX_PARTICLES; i++) {
                if (pLife[i] > 0) {
                    pX[i] += pVX[i];
                    pY[i] += pVY[i];
                    pLife[i] -= 1;

                    if (pX[i] < 0 || pX[i] > width || pY[i] < 0 || pY[i] > height) {
                        pLife[i] -= 5;
                    }

                    const alpha = pLife[i] / pMaxLife[i];
                    ctx.beginPath();
                    ctx.arc(pX[i], pY[i], 2 + (engineState.drive * 0.03), 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 255, ${alpha * 0.6})`;
                    ctx.fill();
                }
            }
            ctx.globalCompositeOperation = 'source-over';
            
            const corePulse = 1 + Math.sin(performance.now() / (60000 / displayBpm)) * 0.1;
            const coreSize = 30 + (engineState.drive * 0.5);
            
            const gradient = ctx.createRadialGradient(width/2, height/2, 0, width/2, height/2, coreSize * corePulse);
            gradient.addColorStop(0, 'rgba(255,255,255,0.8)');
            gradient.addColorStop(1, 'rgba(255,255,255,0)');
            
            ctx.beginPath();
            ctx.arc(width/2, height/2, coreSize * corePulse, 0, Math.PI * 2);
            ctx.fillStyle = gradient;
            ctx.fill();
        }

        function tick(time) {
            const deltaTime = time - engineState.lastTime;
            engineState.lastTime = time;
            engineState.accumulator += deltaTime;

            while (engineState.accumulator >= FRAME_TIME) {
                updatePhysics();
                engineState.accumulator -= FRAME_TIME;
            }

            resizeCanvas();
            drawParticles(canvas.width, canvas.height);

            requestAnimationFrame(tick);
        }

        requestAnimationFrame((time) => {
            engineState.lastTime = time;
            tick(time);
        });

    </script>
</body>
</html>
