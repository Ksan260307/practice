<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D ボール遊び場 - フリーカメラ版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-panel: rgba(255, 255, 255, 0.85);
            --text-main: #333;
        }
        body {
            margin: 0;
            overflow: hidden;
            background-color: #87CEEB;
            font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
            touch-action: none;
            user-select: none;
        }
        
        .ui-element {
            position: absolute;
            z-index: 20;
            transition: opacity 0.3s, transform 0.2s;
        }

        #ui-toggle-btn {
            top: 20px;
            right: 20px;
            width: 44px;
            height: 44px;
            background: var(--bg-panel);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            backdrop-filter: blur(5px);
        }

        #ui-container {
            top: 20px;
            left: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }

        .panel {
            background: var(--bg-panel);
            padding: 15px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            pointer-events: auto;
            min-width: 220px;
            backdrop-filter: blur(5px);
        }

        h1 {
            margin: 0 0 10px 0;
            font-size: 16px;
            color: var(--text-main);
            border-bottom: 2px solid #ddd;
            padding-bottom: 8px;
        }

        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            font-size: 13px;
            font-weight: bold;
            color: #555;
        }

        .value-badge {
            background: #f3f4f6;
            padding: 4px 8px;
            border-radius: 6px;
            color: var(--primary);
        }

        .perf-good { color: #10b981; }
        .perf-ok { color: #f59e0b; }
        .perf-bad { color: #ef4444; }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 12px;
        }

        button {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            outline: none;
        }
        button:active { transform: scale(0.96); }
        button.btn-alt { background: #6366f1; }
        button.btn-danger { background: #ef4444; }

        #joystick-container {
            bottom: 40px;
            left: 40px;
            width: 110px;
            height: 110px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.4);
            display: none;
            touch-action: none;
        }
        #joystick-knob {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 44px;
            height: 44px;
            background: white;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        #height-controls {
            right: 20px;
            bottom: 40px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            display: none;
        }
        .v-btn {
            width: 56px;
            height: 56px;
            border-radius: 50% !important;
            font-size: 22px !important;
            background: var(--bg-panel) !important;
            color: #333 !important;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #guide {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 12px;
            pointer-events: none;
            backdrop-filter: blur(4px);
            white-space: nowrap;
            z-index: 10;
        }

        @media (max-width: 600px) {
            #ui-container { top: 10px; left: 10px; }
            #ui-toggle-btn { top: 10px; right: 10px; }
            #height-controls { bottom: 30px; right: 20px; }
            #guide { bottom: 10px; font-size: 10px; }
        }
    </style>
</head>
<body>

<div id="ui-toggle-btn" class="ui-element" onclick="app.toggleUI()">👁️</div>

<div id="ui-container" class="ui-element">
    <div class="panel">
        <h1>🟢 ボール遊び場</h1>
        
        <div class="status-row">
            <span>ボール数:</span>
            <span id="ui-count" class="value-badge">0 / 100000</span>
        </div>
        
        <div class="status-row">
            <span>カメラ状態:</span>
            <span id="ui-cam-mode" class="value-badge">固定モード</span>
        </div>

        <div class="status-row">
            <span>FPS:</span>
            <span id="ui-perf" class="perf-good">測定中...</span>
        </div>
        
        <div class="controls">
            <button class="btn-alt" onclick="app.toggleCameraMode()">📸 カメラ切替 (F)</button>
            <button onclick="app.resetCamera()">🏠 カメラをリセット</button>
            <button onclick="app.addBalls(500)">➕ ボール追加 (500)</button>
            <button class="btn-danger" onclick="app.clearBalls()">🗑️ おかたづけ</button>
        </div>
    </div>
</div>

<div id="joystick-container" class="ui-element">
    <div id="joystick-knob"></div>
</div>

<div id="height-controls" class="ui-element">
    <button class="v-btn" id="btn-up">🔼</button>
    <button class="v-btn" id="btn-down">🔽</button>
</div>

<div id="guide">
    📸 [F]でフリーモード切替 / 👆タップ:衝撃波
</div>

<script>
/**
 * PhysicsEngine (物理演算コア)
 */
class PhysicsEngine {
    constructor(maxCapacity = 100000) {
        this.max = maxCapacity;
        this.activeCount = 0;
        this.radius = 1.0;
        this.boxSize = 45; 
        
        this.state = {
            px: new Float32Array(this.max), py: new Float32Array(this.max), pz: new Float32Array(this.max),
            vx: new Float32Array(this.max), vy: new Float32Array(this.max), vz: new Float32Array(this.max),
            colorId: new Float32Array(this.max),
            active: new Uint8Array(this.max),
            flash: new Float32Array(this.max)
        };

        this.fixedDt = 1 / 60; 
        this.gy = -40.0;
        this.bounce = 0.75;      
        this.friction = 0.98;   
        this.ballBounce = 0.8;   
        this.airDrag = 0.998;

        this.cellSize = 2.5; 
        this.gridRes = Math.ceil((this.boxSize * 2.5) / this.cellSize); 
        this.totalCells = this.gridRes ** 3;
        this.head = new Int32Array(this.totalCells).fill(-1);
        this.next = new Int32Array(this.max).fill(-1);
    }

    applyImpulse(cx, cy, cz, power, blastRadius) {
        const rSq = blastRadius * blastRadius;
        for (let i = 0; i < this.max; i++) {
            if (this.state.active[i] === 0) continue;
            const dx = this.state.px[i] - cx;
            const dy = this.state.py[i] - cy;
            const dz = this.state.pz[i] - cz;
            const d2 = dx*dx + dy*dy + dz*dz;
            if (d2 < rSq) {
                const dist = Math.sqrt(d2) || 0.1; 
                const force = (1.0 - dist / blastRadius) * power;
                this.state.vx[i] += (dx / dist) * force;
                this.state.vy[i] += (dy / dist) * force + force * 0.3;
                this.state.vz[i] += (dz / dist) * force;
                this.state.flash[i] = 1.0; 
            }
        }
    }

    spawnFloating(count, originX, originY, originZ) {
        let spawned = 0;
        for (let i = 0; i < this.max && spawned < count; i++) {
            if (this.state.active[i] === 0) {
                this.state.px[i] = originX + (Math.random() - 0.5) * 12;
                this.state.py[i] = originY + (Math.random() - 0.5) * 12;
                this.state.pz[i] = originZ + (Math.random() - 0.5) * 12;
                this.state.vx[i] = (Math.random() - 0.5) * 6;
                this.state.vy[i] = 5 + Math.random() * 12;
                this.state.vz[i] = (Math.random() - 0.5) * 6;
                this.state.colorId[i] = Math.random(); 
                this.state.active[i] = 1;
                spawned++;
                this.activeCount++;
            }
        }
    }

    clearAll() {
        this.state.active.fill(0);
        this.activeCount = 0;
    }

    step() {
        const dt = this.fixedDt;
        const radius = this.radius;
        const box = this.boxSize;
        const diameterSq = (radius * 2) ** 2;

        this.head.fill(-1);

        for (let i = 0; i < this.max; i++) {
            if (this.state.active[i] === 0) continue;

            this.state.vy[i] += this.gy * dt;
            this.state.vx[i] *= this.airDrag;
            this.state.vy[i] *= this.airDrag;
            this.state.vz[i] *= this.airDrag;

            if (this.state.flash[i] > 0) this.state.flash[i] -= dt * 2.0;

            this.state.px[i] += this.state.vx[i] * dt;
            this.state.py[i] += this.state.vy[i] * dt;
            this.state.pz[i] += this.state.vz[i] * dt;

            const checkBound = (axis, vAxis, min, max) => {
                if (this.state[axis][i] < min + radius) {
                    this.state[axis][i] = min + radius;
                    this.state[vAxis][i] *= -this.bounce;
                } else if (this.state[axis][i] > max - radius) {
                    this.state[axis][i] = max - radius;
                    this.state[vAxis][i] *= -this.bounce;
                }
            };
            checkBound('px', 'vx', -box, box);
            checkBound('py', 'vy', -box, box * 4);
            checkBound('pz', 'vz', -box, box);

            const cx = Math.floor((this.state.px[i] + box) / this.cellSize);
            const cy = Math.floor((this.state.py[i] + box) / this.cellSize);
            const cz = Math.floor((this.state.pz[i] + box) / this.cellSize);
            if (cx >= 0 && cx < this.gridRes && cy >= 0 && cy < this.gridRes && cz >= 0 && cz < this.gridRes) {
                const h = cx + cy * this.gridRes + cz * this.gridRes * this.gridRes;
                this.next[i] = this.head[h];
                this.head[h] = i;
            }
        }

        for (let i = 0; i < this.max; i++) {
            if (this.state.active[i] === 0) continue;
            const cx = Math.floor((this.state.px[i] + box) / this.cellSize);
            const cy = Math.floor((this.state.py[i] + box) / this.cellSize);
            const cz = Math.floor((this.state.pz[i] + box) / this.cellSize);

            for (let ox = -1; ox <= 1; ox++) {
                for (let oy = -1; oy <= 1; oy++) {
                    for (let oz = -1; oz <= 1; oz++) {
                        const nx = cx + ox, ny = cy + oy, nz = cz + oz;
                        if (nx < 0 || nx >= this.gridRes || ny < 0 || ny >= this.gridRes || nz < 0 || nz >= this.gridRes) continue;
                        const h = nx + ny * this.gridRes + nz * this.gridRes * this.gridRes;
                        let j = this.head[h];
                        while (j !== -1) {
                            if (i < j) {
                                const dx = this.state.px[i] - this.state.px[j];
                                const dy = this.state.py[i] - this.state.py[j];
                                const dz = this.state.pz[i] - this.state.pz[j];
                                const d2 = dx*dx + dy*dy + dz*dz;
                                if (d2 > 0 && d2 < diameterSq) {
                                    const d = Math.sqrt(d2);
                                    const nx_n = dx / d, ny_n = dy / d, nz_n = dz / d;
                                    const c = (radius * 2 - d) * 0.5;
                                    this.state.px[i] += nx_n * c; this.state.py[i] += ny_n * c; this.state.pz[i] += nz_n * c;
                                    this.state.px[j] -= nx_n * c; this.state.py[j] -= ny_n * c; this.state.pz[j] -= nz_n * c;
                                    
                                    const rvx = this.state.vx[i] - this.state.vx[j];
                                    const rvy = this.state.vy[i] - this.state.vy[j];
                                    const rvz = this.state.vz[i] - this.state.vz[j];
                                    const vn = rvx * nx_n + rvy * ny_n + rvz * nz_n;
                                    if (vn < 0) {
                                        const impulse = -(1 + this.ballBounce) * vn * 0.5;
                                        this.state.vx[i] += impulse * nx_n; this.state.vy[i] += impulse * ny_n; this.state.vz[i] += impulse * nz_n;
                                        this.state.vx[j] -= impulse * nx_n; this.state.vy[j] -= impulse * ny_n; this.state.vz[j] -= impulse * nz_n;
                                    }
                                }
                            }
                            j = this.next[j];
                        }
                    }
                }
            }
        }
    }
}

// --- メインアプリ ---
class App {
    constructor() {
        this.physics = new PhysicsEngine(100000);
        
        // --- 30色のパレットを生成 ---
        this.colorPalette = [];
        for (let i = 0; i < 30; i++) {
            const color = new THREE.Color();
            color.setHSL(i / 30, 0.8, 0.55); 
            this.colorPalette.push(color);
        }
        
        this.whiteColor = new THREE.Color(0xffffff);
        this.dummy = new THREE.Object3D();
        this.keys = {};
        this.cameraMode = 'fixed'; 
        this.moveVector = new THREE.Vector3(0,0,0);
        this.uiVisible = true;
        
        // 初期カメラ設定値
        this.initialCamPos = new THREE.Vector3(0, 50, 120);

        this.yaw = 0;
        this.pitch = 0;
        this.pointerPos = { x: 0, y: 0 };
        this.isPointerDown = false;
        this.isMoving = false;

        this.initThree();
        this.initControls();
        this.bindEvents();
        this.animate();
    }

    initThree() {
        this.scene = new THREE.Scene();
        this.scene.background = new THREE.Color(0x87CEEB);
        this.scene.fog = new THREE.Fog(0x87CEEB, 60, 220);

        this.camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        this.camera.position.copy(this.initialCamPos);
        this.camera.lookAt(0, 0, 0);

        this.renderer = new THREE.WebGLRenderer({ antialias: true });
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        this.renderer.shadowMap.enabled = true;
        document.body.appendChild(this.renderer.domElement);

        this.orbitControls = new THREE.OrbitControls(this.camera, this.renderer.domElement);
        this.orbitControls.enabled = false; 
        this.orbitControls.enableDamping = true;
        this.orbitControls.dampingFactor = 0.05;

        this.scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0); 
        dirLight.position.set(50, 120, 50);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        this.scene.add(dirLight);

        const floorGeo = new THREE.PlaneGeometry(400, 400);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0xeeeeee, roughness: 0.9 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = -this.physics.boxSize;
        floor.receiveShadow = true;
        this.scene.add(floor);

        const grid = new THREE.GridHelper(400, 40, 0x000000, 0x000000);
        grid.material.opacity = 0.1; grid.material.transparent = true;
        grid.position.y = -this.physics.boxSize + 0.1;
        this.scene.add(grid);

        const sphereGeo = new THREE.SphereGeometry(this.physics.radius, 8, 8);
        const sphereMat = new THREE.MeshStandardMaterial({ roughness: 0.3, metalness: 0.1 });
        this.instancedMesh = new THREE.InstancedMesh(sphereGeo, sphereMat, this.physics.max);
        this.instancedMesh.castShadow = true;
        this.scene.add(this.instancedMesh);
        
        for (let i = 0; i < this.physics.max; i++) {
            this.dummy.position.set(0, -999, 0);
            this.dummy.updateMatrix();
            this.instancedMesh.setMatrixAt(i, this.dummy.matrix);
            this.instancedMesh.setColorAt(i, this.whiteColor);
        }
    }

    initControls() {
        window.addEventListener('keydown', (e) => {
            this.keys[e.code] = true;
            if (e.code === 'Space' && document.activeElement instanceof HTMLButtonElement) {
                document.activeElement.blur();
            }
        });
        window.addEventListener('keyup', (e) => {
            this.keys[e.code] = false;
            if (e.code === 'KeyF') this.toggleCameraMode();
        });

        const joystickContainer = document.getElementById('joystick-container');
        const joystickKnob = document.getElementById('joystick-knob');
        this.joyState = { active: false, x: 0, y: 0 };

        const handleJoyStart = (e) => {
            if (this.cameraMode !== 'free') return;
            this.joyState.active = true;
            joystickContainer.style.background = "rgba(255,255,255,0.4)";
        };
        const handleJoyMove = (e) => {
            if (!this.joyState.active) return;
            const touch = e.touches ? e.touches[0] : e;
            const rect = joystickContainer.getBoundingClientRect();
            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;
            let dx = touch.clientX - cx;
            let dy = touch.clientY - cy;
            const dist = Math.min(rect.width / 2, Math.sqrt(dx*dx + dy*dy));
            const angle = Math.atan2(dy, dx);
            this.joyState.x = (Math.cos(angle) * dist) / (rect.width / 2);
            this.joyState.y = (Math.sin(angle) * dist) / (rect.width / 2);
            joystickKnob.style.transform = `translate(calc(-50% + ${Math.cos(angle)*dist}px), calc(-50% + ${Math.sin(angle)*dist}px))`;
        };
        const handleJoyEnd = () => {
            this.joyState.active = false;
            this.joyState.x = 0; this.joyState.y = 0;
            joystickKnob.style.transform = `translate(-50%, -50%)`;
            joystickContainer.style.background = "rgba(255,255,255,0.2)";
        };

        joystickContainer.addEventListener('touchstart', handleJoyStart);
        window.addEventListener('touchmove', handleJoyMove, { passive: false });
        window.addEventListener('touchend', handleJoyEnd);

        const setupHeightBtn = (id, key) => {
            const btn = document.getElementById(id);
            btn.addEventListener('pointerdown', () => { this.keys[key] = true; btn.blur(); });
            btn.addEventListener('pointerup', () => this.keys[key] = false);
            btn.addEventListener('pointerleave', () => this.keys[key] = false);
        };
        setupHeightBtn('btn-up', 'Space');
        setupHeightBtn('btn-down', 'ShiftLeft');
    }

    bindEvents() {
        window.addEventListener('resize', () => {
            this.camera.aspect = window.innerWidth / window.innerHeight;
            this.camera.updateProjectionMatrix();
            this.renderer.setSize(window.innerWidth, window.innerHeight);
        });

        window.addEventListener('pointerdown', (e) => {
            this.isPointerDown = true;
            this.isMoving = false;
            this.pointerPos = { x: e.clientX, y: e.clientY };
        });

        window.addEventListener('pointermove', (e) => {
            if (!this.isPointerDown) return;
            const dx = e.clientX - this.pointerPos.x;
            const dy = e.clientY - this.pointerPos.y;
            
            if (Math.abs(dx) > 2 || Math.abs(dy) > 2) {
                this.isMoving = true;
                if (this.cameraMode === 'free') {
                    const sens = 0.003;
                    this.yaw -= dx * sens;
                    this.pitch -= dy * sens;
                    this.pitch = Math.max(-Math.PI/2.1, Math.min(Math.PI/2.1, this.pitch));
                }
            }
            this.pointerPos = { x: e.clientX, y: e.clientY };
        });

        window.addEventListener('pointerup', (e) => {
            this.isPointerDown = false;
            if (this.isMoving) return;
            
            const elem = document.elementFromPoint(e.clientX, e.clientY);
            if (elem && (elem.tagName === 'BUTTON' || elem.closest('.ui-element'))) return;

            const mouse = new THREE.Vector2(
                (e.clientX / window.innerWidth) * 2 - 1,
                -(e.clientY / window.innerHeight) * 2 + 1
            );
            const ray = new THREE.Raycaster();
            ray.setFromCamera(mouse, this.camera);
            const intersects = ray.intersectObjects(this.scene.children);
            if (intersects.length > 0) {
                const p = intersects[0].point;
                this.physics.applyImpulse(p.x, p.y, p.z, 75, 40);
            }
        });
    }

    toggleCameraMode() {
        if (document.activeElement instanceof HTMLButtonElement) {
            document.activeElement.blur();
        }

        this.cameraMode = this.cameraMode === 'fixed' ? 'free' : 'fixed';
        const modeLabel = document.getElementById('ui-cam-mode');
        const joystick = document.getElementById('joystick-container');
        const heightCtrls = document.getElementById('height-controls');
        const guide = document.getElementById('guide');
        
        if (this.cameraMode === 'free') {
            modeLabel.innerText = 'フリーモード';
            this.orbitControls.enabled = false;
            if (window.innerWidth < 600) joystick.style.display = 'block';
            heightCtrls.style.display = 'flex';
            guide.innerText = '🖱️ドラッグ:視点変更 / WASD:移動 / [Space]:上昇 / 👆タップ:衝撃波';
            const euler = new THREE.Euler().setFromQuaternion(this.camera.quaternion, 'YXZ');
            this.yaw = euler.y;
            this.pitch = euler.x;
        } else {
            modeLabel.innerText = '固定モード';
            this.orbitControls.enabled = false; 
            joystick.style.display = 'none';
            heightCtrls.style.display = 'none';
            guide.innerText = '📸 [F]でフリーモード切替 / 👆タップ:衝撃波';
        }
    }

    resetCamera() {
        if (document.activeElement instanceof HTMLButtonElement) {
            document.activeElement.blur();
        }

        this.camera.position.copy(this.initialCamPos);
        this.camera.lookAt(0, 0, 0);

        // フリーモード用パラメータもリセット
        const euler = new THREE.Euler().setFromQuaternion(this.camera.quaternion, 'YXZ');
        this.yaw = euler.y;
        this.pitch = euler.x;
        
        // 慣性をリセット
        this.moveVector.set(0, 0, 0);

        if (this.cameraMode === 'fixed') {
            this.orbitControls.reset();
            this.orbitControls.enabled = false;
        }
    }

    toggleUI() {
        this.uiVisible = !this.uiVisible;
        const els = ['.panel', '#guide', '#height-controls', '#joystick-container'];
        els.forEach(sel => {
            const el = document.querySelector(sel);
            if (!el) return;
            if (this.cameraMode !== 'free' && (sel === '#joystick-container' || sel === '#height-controls')) return;
            el.style.opacity = this.uiVisible ? '1' : '0';
            el.style.pointerEvents = this.uiVisible ? 'auto' : 'none';
        });
        document.getElementById('ui-toggle-btn').innerText = this.uiVisible ? '👁️' : '🙈';
    }

    addBalls(n) { this.physics.spawnFloating(n, 0, 40, 0); if (document.activeElement) document.activeElement.blur(); }
    clearBalls() { this.physics.clearAll(); if (document.activeElement) document.activeElement.blur(); }

    updateCamera(dt) {
        if (this.cameraMode === 'fixed') return;
        this.camera.quaternion.setFromEuler(new THREE.Euler(this.pitch, this.yaw, 0, 'YXZ'));
        const speed = 70 * dt;
        const dirForward = new THREE.Vector3(0, 0, -1).applyQuaternion(this.camera.quaternion);
        dirForward.y = 0; dirForward.normalize();
        const dirSide = new THREE.Vector3(1, 0, 0).applyQuaternion(this.camera.quaternion);
        dirSide.y = 0; dirSide.normalize();
        const inputVec = new THREE.Vector3(0,0,0);
        if (this.keys['KeyW']) inputVec.add(dirForward);
        if (this.keys['KeyS']) inputVec.add(dirForward.clone().negate());
        if (this.keys['KeyA']) inputVec.add(dirSide.clone().negate());
        if (this.keys['KeyD']) inputVec.add(dirSide);
        if (this.joyState.active) {
            inputVec.add(dirForward.clone().multiplyScalar(-this.joyState.y));
            inputVec.add(dirSide.clone().multiplyScalar(this.joyState.x));
        }
        if (inputVec.length() > 0) inputVec.normalize();
        this.moveVector.lerp(inputVec.multiplyScalar(speed), 0.15);
        this.camera.position.add(this.moveVector);
        if (this.keys['Space']) this.camera.position.y += speed;
        if (this.keys['ShiftLeft']) this.camera.position.y -= speed;
    }

    animate() {
        requestAnimationFrame(() => this.animate());
        const now = performance.now();
        const dt = Math.min((now - (this.lastTime || now)) / 1000, 0.1);
        this.lastTime = now;

        this.physics.step();
        this.updateCamera(dt);

        for (let i = 0; i < this.physics.max; i++) {
            if (this.physics.state.active[i]) {
                this.dummy.position.set(this.physics.state.px[i], this.physics.state.py[i], this.physics.state.pz[i]);
                this.dummy.updateMatrix();
                this.instancedMesh.setMatrixAt(i, this.dummy.matrix);
                
                const base = this.colorPalette[Math.floor(this.physics.state.colorId[i] * (this.colorPalette.length - 0.001))];
                const flash = this.physics.state.flash[i];
                if (flash > 0.05) {
                    this.instancedMesh.setColorAt(i, base.clone().lerp(this.whiteColor, flash));
                } else {
                    this.instancedMesh.setColorAt(i, base);
                }
            } else {
                this.dummy.position.set(0, -999, 0);
                this.dummy.updateMatrix();
                this.instancedMesh.setMatrixAt(i, this.dummy.matrix);
            }
        }
        
        this.instancedMesh.instanceMatrix.needsUpdate = true;
        if (this.instancedMesh.instanceColor) {
            this.instancedMesh.instanceColor.needsUpdate = true;
        }

        this.renderer.render(this.scene, this.camera);

        if (now - (this.lastUiUpdate || 0) > 500) {
            document.getElementById('ui-count').innerText = `${this.physics.activeCount} / 100000`;
            const fps = Math.round(1 / dt);
            const perf = document.getElementById('ui-perf');
            perf.innerText = `${fps} FPS`;
            perf.className = fps > 50 ? 'perf-good' : fps > 30 ? 'perf-ok' : 'perf-bad';
            this.lastUiUpdate = now;
        }
    }
}

window.onload = () => { window.app = new App(); };
</script>
