<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIF STRIKER - ZMF/UCD-F Combat Core</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; user-select: none; }
        canvas { display: block; }

        /* UI Overlay */
        #ui-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            color: #0ff;
            text-shadow: 0 0 10px #0ff;
        }

        /* Header Info */
        #header { padding: 20px; font-size: 14px; letter-spacing: 2px; }

        /* Controls Area */
        #controls-root {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 30px;
            pointer-events: auto;
        }

        /* Virtual Joystick Area */
        #joystick-zone {
            width: 150px; height: 150px;
            background: rgba(0, 255, 255, 0.1);
            border: 2px solid rgba(0, 255, 255, 0.3);
            border-radius: 50%;
            position: relative;
            touch-action: none;
        }
        #joystick-stick {
            width: 60px; height: 60px;
            background: rgba(0, 255, 255, 0.5);
            border-radius: 50%;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 20px #0ff;
        }

        /* Parameters Area (Sliders) */
        #params-panel {
            background: rgba(0, 20, 40, 0.7);
            border: 1px solid #0ff;
            padding: 15px;
            border-radius: 10px;
            width: 200px;
            backdrop-filter: blur(5px);
        }
        .slider-group { margin-bottom: 12px; }
        .slider-group label { display: block; font-size: 12px; margin-bottom: 5px; color: #0ff; }
        input[type=range] {
            width: 100%;
            appearance: none;
            background: #003344;
            height: 4px;
            border-radius: 2px;
            outline: none;
        }
        input[type=range]::-webkit-slider-thumb {
            appearance: none;
            width: 16px; height: 16px;
            background: #0ff;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px #0ff;
        }

        #speed-lines {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.1s;
            background: radial-gradient(circle, transparent 30%, rgba(0, 255, 255, 0.1) 100%);
        }
    </style>
</head>
<body>

<div id="speed-lines"></div>

<div id="ui-container">
    <div id="header">
        <div>VIF STRIKER // ZMF-UCD-F INTEGRATED ENGINE</div>
        <div id="stats">FPS: -- | TARGETS: 0</div>
    </div>

    <div id="controls-root">
        <!-- Joystick -->
        <div id="joystick-zone">
            <div id="joystick-stick"></div>
        </div>

        <!-- Parameters (ZMF Interface) -->
        <div id="params-panel">
            <div class="slider-group">
                <label>前進スピード (World Speed)</label>
                <input type="range" id="param-worldspeed" min="0" max="10" step="0.5" value="2.0">
            </div>
            <div class="slider-group">
                <label>機体の重さ (Mass)</label>
                <input type="range" id="param-mass" min="0.5" max="5" step="0.1" value="1.0">
            </div>
            <div class="slider-group">
                <label>動きのキレ (Crispness)</label>
                <input type="range" id="param-crisp" min="0.01" max="0.5" step="0.01" value="0.1">
            </div>
            <div class="slider-group">
                <label>旋回の傾き (Leaning)</label>
                <input type="range" id="param-bank" min="0" max="60" step="1" value="30">
            </div>
            <div class="slider-group">
                <label>ブレーキの強さ (Braking)</label>
                <input type="range" id="param-brake" min="0.8" max="0.99" step="0.01" value="0.95">
            </div>
        </div>
    </div>
</div>

<script>
/**
 * VIF STRIKER - Core Simulation Script
 * Logic based on ZMF v1.0.0 & UCD-F v1.0.0
 */

// --- CONFIG & ZMF PARAMETERS ---
const CONFIG = {
    mass: 1.0,
    zeta: 0.1,
    maxBank: 30,
    viscosity: 0.95,
    worldSpeed: 2.0, // 純粋な前進速度
    enemySpawnRate: 0.05, 
    maxEnemies: 100 
};

// --- UCD-F: SoA (Structure of Arrays) Data Model ---
const PlayerState = {
    pos: new Float32Array(3),
    vel: new Float32Array(3),
    acc: new Float32Array(3),
    prevAcc: new Float32Array(3),
    bank: 0,
    targetInput: { x: 0, y: 0 }
};

const EnemyState = {
    count: 0,
    posX: new Float32Array(CONFIG.maxEnemies),
    posY: new Float32Array(CONFIG.maxEnemies),
    posZ: new Float32Array(CONFIG.maxEnemies),
    velZ: new Float32Array(CONFIG.maxEnemies),
    meshes: [] 
};

// --- THREE.JS SETUP ---
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x000510, 0.012);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x000510);
document.body.appendChild(renderer.domElement);

// --- ASSETS ---
const shipGroup = new THREE.Group();
const shipBody = new THREE.Mesh(
    new THREE.ConeGeometry(0.5, 2, 4),
    new THREE.MeshPhongMaterial({ color: 0x00ffff, wireframe: false, flatShading: true })
);
shipBody.rotation.x = Math.PI / 2;
shipGroup.add(shipBody);
const wings = new THREE.Mesh(new THREE.BoxGeometry(2, 0.1, 0.7), new THREE.MeshPhongMaterial({ color: 0x0088ff }));
shipGroup.add(wings);
scene.add(shipGroup);

const enemyGeo = new THREE.OctahedronGeometry(0.8);
const enemyMat = new THREE.MeshPhongMaterial({ color: 0xff3300, emissive: 0x440000 });

for (let i = 0; i < CONFIG.maxEnemies; i++) {
    const mesh = new THREE.Mesh(enemyGeo, enemyMat);
    mesh.visible = false;
    scene.add(mesh);
    EnemyState.meshes.push(mesh);
}

scene.add(new THREE.AmbientLight(0x404040));
const sunLight = new THREE.DirectionalLight(0xffffff, 1);
sunLight.position.set(5, 5, 5);
scene.add(sunLight);

const gridHelper = new THREE.GridHelper(800, 100, 0x004444, 0x001111);
gridHelper.position.y = -8;
scene.add(gridHelper);

const pillars = [];
for(let i=0; i<30; i++) {
    const p = new THREE.Mesh(new THREE.BoxGeometry(2, 20, 2), new THREE.MeshPhongMaterial({ color: 0x001122 }));
    p.position.set((Math.random()-0.5)*100, 2, -i * 20);
    scene.add(p);
    pillars.push(p);
}

// --- LOGIC: SWAP AND POP ---
function spawnEnemy() {
    if (EnemyState.count >= CONFIG.maxEnemies) return;
    const i = EnemyState.count;
    EnemyState.posX[i] = (Math.random() - 0.5) * 60;
    EnemyState.posY[i] = (Math.random() - 0.5) * 30;
    EnemyState.posZ[i] = -400; 
    EnemyState.velZ[i] = 1.0 + Math.random() * 2.0; 
    EnemyState.meshes[i].visible = true;
    EnemyState.count++;
}

function removeEnemy(index) {
    if (index >= EnemyState.count) return;
    const lastIdx = EnemyState.count - 1;
    if (index !== lastIdx) {
        EnemyState.posX[index] = EnemyState.posX[lastIdx];
        EnemyState.posY[index] = EnemyState.posY[lastIdx];
        EnemyState.posZ[index] = EnemyState.posZ[lastIdx];
        EnemyState.velZ[index] = EnemyState.velZ[lastIdx];
    }
    EnemyState.meshes[lastIdx].visible = false;
    EnemyState.count--;
}

// --- INPUT ---
const joystickZone = document.getElementById('joystick-zone');
const joystickStick = document.getElementById('joystick-stick');
let isTouching = false;

function handleJoystick(e) {
    if (!isTouching) return;
    const touch = e.touches ? e.touches[0] : e;
    const rect = joystickZone.getBoundingClientRect();
    const centerX = rect.left + rect.width / 2;
    const centerY = rect.top + rect.height / 2;
    const dx = touch.clientX - centerX;
    const dy = touch.clientY - centerY;
    const distance = Math.min(60, Math.sqrt(dx*dx + dy*dy));
    const angle = Math.atan2(dy, dx);
    const moveX = Math.cos(angle) * distance;
    const moveY = Math.sin(angle) * distance;
    joystickStick.style.transform = `translate(calc(-50% + ${moveX}px), calc(-50% + ${moveY}px))`;
    PlayerState.targetInput.x = moveX / 60;
    PlayerState.targetInput.y = -moveY / 60; 
}

joystickZone.addEventListener('touchstart', (e) => { isTouching = true; handleJoystick(e); });
window.addEventListener('touchmove', (e) => { handleJoystick(e); e.preventDefault(); }, { passive: false });
window.addEventListener('touchend', () => { 
    isTouching = false; 
    PlayerState.targetInput.x = 0; PlayerState.targetInput.y = 0;
    joystickStick.style.transform = `translate(-50%, -50%)`;
});
joystickZone.addEventListener('mousedown', (e) => { isTouching = true; handleJoystick(e); });
window.addEventListener('mousemove', (e) => { if(isTouching) handleJoystick(e); });
window.addEventListener('mouseup', () => { isTouching = false; PlayerState.targetInput.x = 0; PlayerState.targetInput.y = 0; joystickStick.style.transform = `translate(-50%, -50%)`; });

// --- PHYSICS ENGINE ---
const dt = 1/60;
function updatePhysics() {
    // 1. Player Physics (ZMF)
    const forceX = PlayerState.targetInput.x * 450; 
    const forceY = PlayerState.targetInput.y * 450;

    PlayerState.pos[0] += PlayerState.vel[0] * dt + 0.5 * PlayerState.acc[0] * dt * dt;
    PlayerState.pos[1] += PlayerState.vel[1] * dt + 0.5 * PlayerState.acc[1] * dt * dt;
    
    PlayerState.prevAcc[0] = PlayerState.acc[0];
    PlayerState.prevAcc[1] = PlayerState.acc[1];

    PlayerState.acc[0] = (forceX - CONFIG.zeta * 100 * PlayerState.vel[0]) / CONFIG.mass;
    PlayerState.acc[1] = (forceY - CONFIG.zeta * 100 * PlayerState.vel[1]) / CONFIG.mass;

    PlayerState.vel[0] += 0.5 * (PlayerState.prevAcc[0] + PlayerState.acc[0]) * dt;
    PlayerState.vel[1] += 0.5 * (PlayerState.prevAcc[1] + PlayerState.acc[1]) * dt;

    PlayerState.vel[0] *= CONFIG.viscosity;
    PlayerState.vel[1] *= CONFIG.viscosity;

    PlayerState.pos[0] = Math.max(-25, Math.min(25, PlayerState.pos[0]));
    PlayerState.pos[1] = Math.max(-15, Math.min(15, PlayerState.pos[1]));

    const targetBank = -PlayerState.vel[0] * (CONFIG.maxBank * (Math.PI / 180)) * 0.12;
    PlayerState.bank += (targetBank - PlayerState.bank) * 0.18;

    // 2. Enemy Lifecycle
    if (Math.random() < CONFIG.enemySpawnRate) spawnEnemy();

    for (let i = EnemyState.count - 1; i >= 0; i--) {
        // 機体の移動速度 vel[0] に依存せず、純粋に worldSpeed で前進させる
        EnemyState.posZ[i] += EnemyState.velZ[i] + CONFIG.worldSpeed;

        const mesh = EnemyState.meshes[i];
        mesh.position.set(EnemyState.posX[i], EnemyState.posY[i], EnemyState.posZ[i]);
        mesh.rotation.y += 0.05;

        if (EnemyState.posZ[i] > 50) {
            removeEnemy(i);
        }
    }
}

// --- ANIMATION ---
let lastTime = 0;
function animate(time) {
    requestAnimationFrame(animate);
    updatePhysics();

    shipGroup.position.set(PlayerState.pos[0], PlayerState.pos[1], 0);
    shipGroup.rotation.z = PlayerState.bank;

    // ワールド移動速度を完全に CONFIG.worldSpeed 単独で制御
    const moveStep = CONFIG.worldSpeed; 
    
    pillars.forEach(p => {
        p.position.z += moveStep;
        if (p.position.z > 20) {
            p.position.z = -500;
            p.position.x = (Math.random()-0.5)*100;
        }
    });
    gridHelper.position.z = (gridHelper.position.z + moveStep) % 20;

    camera.position.x += (PlayerState.pos[0] * 0.4 - camera.position.x) * 0.08;
    camera.position.y += (PlayerState.pos[1] * 0.4 + 2 - camera.position.y) * 0.08;
    camera.position.z = 12;
    camera.lookAt(PlayerState.pos[0] * 0.7, PlayerState.pos[1] * 0.7, -20);

    const speedLineOpacity = Math.abs(PlayerState.acc[0] + PlayerState.acc[1]) * 0.01;
    document.getElementById('speed-lines').style.opacity = Math.min(0.6, speedLineOpacity);

    renderer.render(scene, camera);
    
    if (time - lastTime > 500) {
        document.getElementById('stats').innerText = `FPS: ${Math.round(1000/(time-lastTime)*30)} | TARGETS: ${EnemyState.count}`;
        lastTime = time;
    }
}

document.getElementById('param-worldspeed').addEventListener('input', (e) => CONFIG.worldSpeed = parseFloat(e.target.value));
document.getElementById('param-mass').addEventListener('input', (e) => CONFIG.mass = parseFloat(e.target.value));
document.getElementById('param-crisp').addEventListener('input', (e) => CONFIG.zeta = parseFloat(e.target.value));
document.getElementById('param-bank').addEventListener('input', (e) => CONFIG.maxBank = parseFloat(e.target.value));
document.getElementById('param-brake').addEventListener('input', (e) => CONFIG.viscosity = parseFloat(e.target.value));

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

animate(0);
</script>
</body>
</html>
